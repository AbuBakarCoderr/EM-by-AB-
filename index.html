<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-repeat:repeat;
background-size:420px;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
position:relative;
overflow:hidden;
}

.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:22px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#ff8ad8,#ffd166);
display:flex;
justify-content:center;
align-items:center;
font-size:8px;
font-weight:bold;
text-align:center;
margin-right:15px;
}

.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
margin:12px 0;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

.bubble{
padding:14px 18px;
border-radius:20px;
max-width:75%;
color:white;
}

.left .bubble{background:#202c33;}
.right .bubble{background:#005c4b;}

.options{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
min-height:220px;
position:relative;
}

.option-btn{
padding:14px 20px;
border:none;
border-radius:30px;
font-weight:bold;
font-size:18px;
cursor:pointer;
transition:0.3s;
background:#25D366;
}

.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<div class="profile">💖</div>
Eid Chat
</div>

<div class="chat-box" id="chatBox"></div>

<div class="step" id="step">Step 1/4</div>

</div>

<script>

const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

let runawayBtn=null;
let growInterval=null;

/* message */
function msg(text,side){
const r=document.createElement("div");
r.className=`message-row ${side}`;
const b=document.createElement("div");
b.className="bubble";
b.innerText=text;
r.appendChild(b);
chatBox.appendChild(r);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* button */
function btn(text,fn){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=text;

b.onclick=fn;
return b;
}

/* STEP 1 */
function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const b1=btn("Eid Mubarak",()=>{
step1Reply("Eid Mubarak");
});

const b2=btn("Same to you",()=>{
runAway(b2,()=>step1Reply("Same to you"));
});

addOptions([b1,b2]);
}

function runAway(button,successFn){

runawayBtn=button;

button.onmousemove=move;
button.ontouchstart=move;

function move(){

const x=Math.random()*220;
const y=Math.random()*120;

button.style.position="absolute";
button.style.left=x+"px";
button.style.top=y+"px";
}

button.onclick=()=>{
clearInterval(runawayBtn);
successFn();
};

}

/* step1 reply */
function step1Reply(t){
msg(t,"right");

setTimeout(()=>{
msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");
step2();
},800);
}

/* STEP 2 */
function step2(){

step.innerText="Step 2/4";

const b1=btn("Kisher Salami?",()=>{});
const b2=btn("Tumi Amare Diba",()=>{});
const b3=btn("Accha Dicchi 😊👍",()=>{
msg("Accha Dicchi 😊👍","right");
setTimeout(step3,700);
});

b1.style.background="#ff6b6b";
b2.style.background="#4d96ff";
b3.style.background="#6bff95";

addOptions([b1,b2,b3]);
}

/* STEP 3 */
let growth=1;
let speed=1;

function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const b10=btn("10 TK",wrongClick);
const b50=btn("50 TK",wrongClick);
const bNo=btn("No salami❌👎",wrongClick);

const b500=btn("500 TK 😡",()=>{
clearInterval(growInterval);
msg("500 TK 😡","right");
alertBox();
});

b500.style.transition="all 0.5s ease";

addOptions([b10,b50,bNo,b500]);

function wrongClick(){
speed+=0.6;
startGrowing(b500,b10,b50,bNo);
}

startGrowing(b500,b10,b50,bNo);
}

function startGrowing(big,...others){

clearInterval(growInterval);

growInterval=setInterval(()=>{

growth+=0.08*speed;

big.style.transform=`scale(${growth})`;
big.style.zIndex=999;

others.forEach(o=>{
o.style.opacity=Math.max(0.1,1-growth/4);
o.style.transform="scale(0.6)";
});

},300);
}

/* overlay */
function alertBox(){

const d=document.createElement("div");

d.innerText="500 TK 😡";

d.style.position="fixed";
d.style.top="50%";
d.style.left="50%";
d.style.transform="translate(-50%,-50%)";
d.style.background="#25D366";
d.style.fontSize="40px";
d.style.padding="30px";
d.style.borderRadius="20px";
d.style.zIndex="9999";

document.body.appendChild(d);

setTimeout(()=>d.remove(),3000);
}

/* add options */
function addOptions(arr){
const w=document.createElement("div");
w.className="options";
arr.forEach(b=>w.appendChild(b));
chatBox.appendChild(w);
return w;
}

step1();

</script>

</body>
</html>
