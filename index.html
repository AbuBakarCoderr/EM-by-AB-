<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid er Chand Aakashe 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:300px;
}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#111827);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
text-align:center;
}

.loader{
width:70px;
height:70px;
border:5px solid rgba(255,255,255,0.1);
border-top:5px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{to{transform:rotate(360deg)}}

#loadingText{
font-size:18px;
margin:8px;
opacity:0.9;
}

/* CHAT */
.chat{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,0.85);
backdrop-filter:blur(4px);
display:none;
flex-direction:column;
}

.header{
height:70px;
display:flex;
align-items:center;
padding:10px;
background:#202c33;
color:white;
}

.pfp{
width:45px;
height:45px;
border-radius:50%;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
margin-right:10px;
}

.title{
font-size:16px;
font-weight:bold;
}

.sub{
font-size:12px;
opacity:0.7;
}

.box{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
margin:10px 0;
max-width:80%;
padding:10px;
border-radius:10px;
color:white;
font-size:14px;
}

.left{background:#202c33; align-self:flex-start;}
.right{background:#005c4b; align-self:flex-end;}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
text-align:right;
}

/* OPTIONS */
.options{
position:relative;
height:250px;
margin-top:10px;
}

.btn{
position:absolute;
padding:12px 16px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

.step{
position:fixed;
bottom:15px;
right:15px;
color:white;
font-size:14px;
background:rgba(0,0,0,0.4);
padding:6px 10px;
border-radius:10px;
}

/* TOAST */
.toastTop{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:10px 15px;
border-radius:20px;
z-index:99999;
}

.toastBottom{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
color:white;
padding:10px 15px;
border-radius:20px;
z-index:99999;
}

/* SHAKE */
.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(-5px,3px)}
50%{transform:translate(5px,-3px)}
75%{transform:translate(-3px,2px)}
100%{transform:translate(0,0)}
}

/* END */
.end{
position:fixed;
inset:0;
background:radial-gradient(circle,#1f2937,#000);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:99999;
text-align:center;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
<div class="loader"></div>
<div id="loadingText">Loading Eid Experience...</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
<div class="header">
<div class="pfp"></div>
<div>
<div class="title">Eid er Chand Aakashe 🌙</div>
<div class="sub">online</div>
</div>
</div>

<div class="box" id="box"></div>
</div>

<div class="step" id="step">Step 1/3</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/sauxt7.mp3">
</audio>

<script>
const loading = document.getElementById("loadingScreen");
const chat = document.getElementById("chat");
const box = document.getElementById("box");
const stepEl = document.getElementById("step");
const music = document.getElementById("music");

let step = 1;
let started = false;

/* LOADING FLOW */
setTimeout(()=> {
document.getElementById("loadingText").innerText =
"Increase volume for better experience 🔊";
},1500);

setTimeout(()=> {
document.getElementById("loadingText").innerText =
"Tap anywhere to start 👇";
},3000);

/* START */
loading.addEventListener("click", start);
loading.addEventListener("touchstart", start);

function start(){
if(started) return;
started = true;

music.play().catch(()=>{});

loading.style.display="none";
chat.style.display="flex";

step1();
}

/* CHAT MSG */
function msg(text, side){
const d=document.createElement("div");
d.className="msg "+side;

d.innerHTML=`
${text}
<div class="time">${new Date().toTimeString().slice(0,5)} ✓✓</div>
`;

box.appendChild(d);
box.scrollTop=box.scrollHeight;
}

/* TOAST */
function toastTop(t){
const d=document.createElement("div");
d.className="toastTop";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1200);
}

function toastBottom(t){
const d=document.createElement("div");
d.className="toastBottom";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1200);
}

/* STEP UPDATE */
function setStep(n){
step=n;
stepEl.innerText=`Step ${n}/3`;
}

/* STEP 1 */
function step1(){
setStep(1);

msg("Assalamu Alaikum Eid Mubarak","left");

const wrap=document.createElement("div");
wrap.className="options";

const a=document.createElement("button");
a.className="btn";
a.innerText="Eid Mubarak";
a.style.left="20px";
a.style.top="40px";
a.style.background="#22c55e";

const b=document.createElement("button");
b.className="btn";
b.innerText="Same to you 👇";
b.style.left="200px";
b.style.top="120px";
b.style.background="#ef4444";

b.onmouseover=runAway;
b.ontouchstart=runAway;

function runAway(){
let x=200+Math.random()*80;
let y=80+Math.random()*80;
b.style.left=x+"px";
b.style.top=y+"px";

document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);

toastTop("Wrong option ❌");
toastBottom("HeeHee 🤭");

navigator.vibrate?.(60);
}

a.onclick=()=>{
msg("Eid Mubarak 😌","right");
wrap.remove();
setTimeout(step2,800);
};

wrap.appendChild(a);
wrap.appendChild(b);
box.appendChild(wrap);
}

/* STEP 2 */
function step2(){
setStep(2);

msg("Dhonnobad Dhonnobad, salamita💁‍♂️","left");

const wrap=document.createElement("div");
wrap.className="options";

function make(text,x,y,color,good=false){
const b=document.createElement("button");
b.className="btn";
b.innerText=text;
b.style.left=x+"px";
b.style.top=y+"px";
b.style.background=color;

if(!good){
b.onmouseover=run;
b.ontouchstart=run;

function run(){
b.style.left=(50+Math.random()*150)+"px";
b.style.top=(30+Math.random()*120)+"px";

document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);

toastTop("Wrong option ❌");
toastBottom("HeeHee 🤭");

navigator.vibrate?.(60);
}
}

if(good){
b.onclick=()=>{
msg(text,"right");
wrap.remove();
setTimeout(step3,800);
};
}

return b;
}

wrap.appendChild(make("Amare tumi diba",20,40,"#3b82f6"));
wrap.appendChild(make("Kisher salami 😡",180,60,"#ef4444"));
wrap.appendChild(make("Accha dicchi 👍",100,160,"#22c55e",true));

box.appendChild(wrap);
}

/* STEP 3 */
function step3(){
setStep(3);

msg("Dhonnobad Dhonnobad, ta koto?","left");

const wrap=document.createElement("div");
wrap.className="options";

function make(text,x,y,size,color,good=false){
const b=document.createElement("button");
b.className="btn";
b.innerText=text;
b.style.left=x+"px";
b.style.top=y+"px";
b.style.background=color;
b.style.transform=`scale(${size})`;

if(!good){
b.onclick=()=>{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
toastTop("Wrong option ❌");
toastBottom("HeeHee 🤭");
navigator.vibrate?.(60);
};
}

if(good){
let scale=0.6;
setInterval(()=>{
scale+=0.05;
b.style.transform=`scale(${scale})`;
},500);

b.onclick=()=>{
wrap.remove();
end();
};
}

return b;
}

wrap.appendChild(make("10 TK",20,40,1.5,"#3b82f6"));
wrap.appendChild(make("30 TK",180,60,1.5,"#ef4444"));
wrap.appendChild(make("No Salami",90,120,1.5,"#f97316"));
wrap.appendChild(make("500 TK 💸",120,200,0.5,"#22c55e",true));

box.appendChild(wrap);
}

/* END */
function end(){
document.body.innerHTML=`
<div class="end">
<h1>🥰 Dhonnobad Dhonnobad</h1>
<p>I receive Salami 💸<br>You receive Dua 🤲</p>
<small style="opacity:0.4;margin-top:20px;writing-mode:vertical-rl">
Dishting · Dishting
</small>
</div>
`;
}

</script>

</body>
</html>
