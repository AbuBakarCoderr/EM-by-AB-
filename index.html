<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-repeat:repeat;
background-size:420px;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
overflow:hidden;
position:relative;
}

.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:22px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#ff8ad8,#ffd166);
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:bold;
margin-right:15px;
}

.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
margin:12px 0;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

.bubble{
padding:14px 18px;
border-radius:20px;
max-width:75%;
color:white;
}

.left .bubble{background:#202c33;}
.right .bubble{background:#005c4b;}

.options{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
min-height:220px;
position:relative;
}

.option-btn{
padding:14px 20px;
border:none;
border-radius:30px;
font-weight:bold;
font-size:18px;
cursor:pointer;
background:#25D366;
transition:0.2s;
}

.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:20px;
}

/* shake */
.shake{animation:shake 0.25s;}
@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-4px,3px);}
50%{transform:translate(4px,-3px);}
75%{transform:translate(-3px,2px);}
100%{transform:translate(0,0);}
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
opacity:0;
pointer-events:none;
z-index:9999;
}

.flash.active{animation:flash 0.3s;}
@keyframes flash{
0%{opacity:0;}
50%{opacity:0.4;}
100%{opacity:0;}
}

/* END SCREEN */
.end-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#0b141a,#111b21);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:99999;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<div class="chat-container">
<div class="header">
<div class="profile">💖</div>
Eid Chat
</div>

<div class="chat-box" id="chatBox"></div>
<div class="step" id="step">Step 1/4</div>
</div>

<script>

/* SONG (ALWAYS LOOP) */
const bgMusic = new Audio("https://files.catbox.moe/sauxt7.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.35;

window.addEventListener("load",()=>{
bgMusic.play().catch(()=>{});
});

document.body.addEventListener("click",()=>{
bgMusic.play().catch(()=>{});
},{once:true});

/* FLASH */
const flash=document.createElement("div");
flash.className="flash";
document.body.appendChild(flash);

/* ELEMENTS */
const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

let tkGrow=1;
let tkInterval;
let tkBtn;

/* VIBRATION */
function vibrate(type){
if(!navigator.vibrate) return;
if(type==="light") navigator.vibrate(15);
if(type==="strong") navigator.vibrate([40,80,40]);
}

/* MESSAGE */
function msg(text,side){
const r=document.createElement("div");
r.className=`message-row ${side}`;
const b=document.createElement("div");
b.className="bubble";
b.innerText=text;

if(side==="right"){
b.innerHTML=text+"<br><span style='color:#53bdeb;font-size:12px;'>✓✓</span>";
}

r.appendChild(b);
chatBox.appendChild(r);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* BUTTON */
function btn(text,fn){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=text;
b.onclick=fn;
return b;
}

/* OPTIONS */
function addOptions(arr){
const w=document.createElement("div");
w.className="options";
arr.forEach(b=>w.appendChild(b));
chatBox.appendChild(w);
}

/* CLEAR */
function clearOptions(){
document.querySelectorAll(".options").forEach(o=>o.remove());
}

/* SAFE RUNAWAY */
function runAway(btn,success){

btn.style.position="absolute";
btn.onclick=success;

btn.onmouseenter=move;
btn.ontouchstart=move;

function move(){

let x,y;

do{
x=Math.random()*280;
y=Math.random()*150;
}while(x<140 && y<90);

btn.style.left=x+"px";
btn.style.top=y+"px";

vibrate("light");
}

}

/* STEP 1 */
function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const b1=btn("Eid Mubarak",()=>{
step1Reply();
});

b1.style.background="#4d96ff";

const b2=btn("Same to you",()=>{
runAway(b2,step1Reply);
});

b2.style.background="#ff6b6b";

addOptions([b1,b2]);
}

/* STEP 1 REPLY */
function step1Reply(){

msg("Eid Mubarak 😌","right");

setTimeout(()=>{
msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");
clearOptions();
step2();
},800);
}

/* STEP 2 */
function step2(){

step.innerText="Step 2/4";

clearOptions();

const b1=btn("Kisher Salami?",()=>{});
const b2=btn("Tumi Amare Diba",()=>{});
const b3=btn("Accha Dicchi 😊👍",()=>{
msg("Accha Dicchi 😊👍","right");
clearOptions();
setTimeout(step3,700);
});

b1.style.background="#ff6b6b";
b2.style.background="#4d96ff";
b3.style.background="#6bff95";

makeRunaway(b1);
makeRunaway(b2);

addOptions([b1,b2,b3]);
}

/* RUNAWAY 2 */
function makeRunaway(btn){
btn.onmouseenter=()=>{
btn.style.transform=`translate(${(Math.random()-0.5)*160}px, ${(Math.random()-0.5)*100}px)`;
};
btn.ontouchstart=btn.onmouseenter;
}

/* STEP 3 */
function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const b10=btn("10 TK",wrong);
const b50=btn("50 TK",wrong);
const bNo=btn("No salami❌👎",wrong);

const b500=btn("500 TK 😡",()=>{
clearInterval(tkInterval);
msg("500 TK 😡","right");
confettiBurst();
finalScreen();
});

b500.style.background="#ff2e63";
b500.style.color="white";

tkBtn=b500;
tkGrow=1;

addOptions([b10,b50,bNo,b500]);

startGrow();

function wrong(){
flashFX();
vibrate("strong");
}
}

/* SLOW GROW */
function startGrow(){

clearInterval(tkInterval);

tkInterval=setInterval(()=>{

tkGrow += 0.01;

tkBtn.style.transform=`scale(${tkGrow})`;
tkBtn.style.zIndex=999;

document.querySelectorAll(".option-btn").forEach(b=>{
if(b!==tkBtn){
b.style.opacity=Math.max(0.25,1-tkGrow/7);
b.style.transform="scale(0.85)";
}
});

},600);

}

/* FLASH */
function flashFX(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),250);

flash.classList.remove("active");
void flash.offsetWidth;
flash.classList.add("active");
}

/* CONFETTI (CENTER BURST) */
function confettiBurst(){

const cx=window.innerWidth/2;
const cy=window.innerHeight/2;

for(let i=0;i<90;i++){

const c=document.createElement("div");
c.innerText=["🎉","✨","🎊","💥"][Math.floor(Math.random()*4)];

c.style.position="fixed";
c.style.left=cx+"px";
c.style.top=cy+"px";
c.style.fontSize="18px";
c.style.zIndex="99999";

document.body.appendChild(c);

const angle=Math.random()*Math.PI*2;
const dist=200+Math.random()*200;

const x=Math.cos(angle)*dist;
const y=Math.sin(angle)*dist;

setTimeout(()=>{

c.style.transition="1.5s ease-out";
c.style.transform=`translate(${x}px,${y}px) scale(0.5)`;
c.style.opacity="0";

},30);

setTimeout(()=>c.remove(),2000);

}

}

/* END SCREEN */
function finalScreen(){

setTimeout(()=>{

document.body.innerHTML=`
<div class="end-screen">
<div style="font-size:70px;">🥰</div>
<h1>Dhonnobad Dhonnobad</h1>
<p>DM e Number dicchi 🥰👍</p>
</div>
`;

},800);

}

step1();

</script>

</body>
</html>
