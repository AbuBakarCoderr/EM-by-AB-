<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-repeat:repeat;
background-size:420px;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
overflow:hidden;
position:relative;
}

.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:22px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:url("https://i.imgur.com/Z6XbK0a.jpeg");
background-size:cover;
background-position:center;
margin-right:15px;
}

.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
flex-direction:column;
margin:12px 0;
}

.left{align-items:flex-start;}
.right{align-items:flex-end;}

.bubble{
padding:14px 18px;
border-radius:20px;
max-width:75%;
color:white;
position:relative;
}

.left .bubble{background:#202c33;}
.right .bubble{background:#005c4b;}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
text-align:right;
}

.options{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
min-height:220px;
position:relative;
}

.option-btn{
padding:14px 20px;
border:none;
border-radius:30px;
font-weight:bold;
font-size:18px;
cursor:pointer;
background:#25D366;
}

.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:20px;
}

/* shake */
.shake{animation:shake 0.25s;}
@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-4px,3px);}
50%{transform:translate(4px,-3px);}
75%{transform:translate(-3px,2px);}
100%{transform:translate(0,0);}
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
color:white;
padding:10px 16px;
border-radius:20px;
z-index:99999;
font-weight:bold;
animation:fade 1.2s ease forwards;
}

@keyframes fade{
0%{opacity:0; transform:translate(-50%,-10px);}
15%{opacity:1;}
100%{opacity:0; transform:translate(-50%,-20px);}
}

.end{
position:fixed;
inset:0;
background:linear-gradient(135deg,#0b141a,#111b21);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:99999;
}

</style>
</head>

<body>

<div class="chat-container">
<div class="header">
<div class="profile"></div>
Eid Chat
</div>

<div class="chat-box" id="chatBox"></div>
<div class="step" id="step">Step 1/4</div>
</div>

<script>

/* ================= SONG ================= */
const bg=new Audio("https://files.catbox.moe/sauxt7.mp3");
bg.loop=true;
bg.volume=0.35;

window.addEventListener("load",()=>bg.play().catch(()=>{}));
document.body.addEventListener("click",()=>bg.play().catch(()=>{}),{once:true});

/* ================= AUDIO ENGINE ================= */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(type){
const o=ctx.createOscillator();
const g=ctx.createGain();
o.connect(g); g.connect(ctx.destination);

if(type==="ding") o.frequency.value=800;
if(type==="woosh") o.frequency.value=300;
if(type==="buzz") o.frequency.value=120;

g.gain.value=0.05;
o.start();
o.stop(ctx.currentTime+0.12);
}

/* ================= VIBRATION ================= */
function vibrate(type){
if(!navigator.vibrate) return;
if(type==="light") navigator.vibrate(15);
if(type==="strong") navigator.vibrate([60,90,60]);
}

/* ================= ELEMENTS ================= */
const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

/* ================= TIME ================= */
function now(){
return new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
});
}

/* ================= MESSAGE ================= */
function msg(text,side){

const r=document.createElement("div");
r.className=`message-row ${side}`;

const b=document.createElement("div");
b.className="bubble";

if(side==="right"){
b.innerHTML=`
${text}
<div class="time">${now()} ✓✓</div>
`;
sound("woosh");
vibrate("light");
}else{
b.innerHTML=`
${text}
<div class="time">${now()}</div>
`;
sound("ding");
}

r.appendChild(b);
chatBox.appendChild(r);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* ================= BUTTON ================= */
function btn(t,f){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=t;
b.onclick=f;
return b;
}

/* ================= OPTIONS ================= */
function add(o){
const w=document.createElement("div");
w.className="options";
o.forEach(x=>w.appendChild(x));
chatBox.appendChild(w);
}

function clear(){
document.querySelectorAll(".options").forEach(e=>e.remove());
}

/* ================= TOAST (FIXED) ================= */
function toast(msg){
const t=document.createElement("div");
t.className="toast";
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),1200);
}

/* ================= STEP 1 RUNAWAY SAFE ================= */
function runaway(btn,fn){

btn.style.position="absolute";
btn.onclick=fn;

btn.onmouseenter=move;
btn.ontouchstart=move;

function move(){

const SAFE_X=170;
const SAFE_Y=110;

let x,y;

do{
x=Math.random()*320;
y=Math.random()*180;
}while(x<SAFE_X && y<SAFE_Y);

btn.style.left=x+"px";
btn.style.top=y+"px";

sound("woosh");
vibrate("light");
}
}

/* ================= STEP 1 ================= */
function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const a=btn("Eid Mubarak",()=>next1());
a.style.background="#4d96ff";

const b=btn("Same to you",()=>runaway(b,next1));
b.style.background="#ff6b6b";

add([a,b]);
}

/* ================= NEXT ================= */
function next1(){

msg("Eid Mubarak 😌","right");
clear();

typing(()=>{
msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");
step2();
});

}

/* ================= TYPING ================= */
function typing(cb){

const d=document.createElement("div");
d.className="message-row left";
d.innerHTML=`<div class="bubble">typing... ●●●</div>`;
chatBox.appendChild(d);

setTimeout(()=>{
d.remove();
cb();
},900);
}

/* ================= STEP 2 ================= */
function step2(){

step.innerText="Step 2/4";

const a=btn("Kisher Salami?",()=>{});
const b=btn("Tumi Amare Diba",()=>{});
const c=btn("Accha Dicchi 😊👍",()=>{

msg("Accha Dicchi 😊👍","right");
clear();

typing(()=>step3());

});

a.style.background="#ff6b6b";
b.style.background="#4d96ff";
c.style.background="#6bff95";

add([a,b,c]);
}

/* ================= STEP 3 ================= */
function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const a=btn("10 TK",wrong);
const b=btn("50 TK",wrong);
const c=btn("No salami❌👎",wrong);

const big=btn("500 TK 😡",()=>{

msg("500 TK 😡","right");
clear();

confetti();
end();

});

big.style.background="#ff2e63";

add([a,b,c,big]);

grow(big);
}

/* ================= GROW (slightly faster) ================= */
let growVal=1;
let growInt;

function grow(b){

clearInterval(growInt);
growVal=1;

growInt=setInterval(()=>{

growVal+=0.015;

b.style.transform=`scale(${growVal})`;

document.querySelectorAll(".option-btn").forEach(x=>{
if(x!==b){
x.style.opacity=Math.max(0.25,1-growVal/6);
x.style.transform="scale(0.8)";
}
});

},400);
}

/* ================= WRONG ================= */
function wrong(){
toast("Wrong option 😡");
flash();
vibrate("strong");
sound("buzz");
}

/* ================= FLASH ================= */
function flash(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),250);
}

/* ================= CONFETTI ================= */
function confetti(){

const cx=innerWidth/2;
const cy=innerHeight/2;

for(let i=0;i<90;i++){

const d=document.createElement("div");
d.innerText=["🎉","✨","🎊"][Math.random()*3|0];

d.style.position="fixed";
d.style.left=cx+"px";
d.style.top=cy+"px";
d.style.fontSize="18px";
document.body.appendChild(d);

const a=Math.random()*Math.PI*2;
const r=240+Math.random()*200;

setTimeout(()=>{
d.style.transition="1.3s ease-out";
d.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;
d.style.opacity="0";
},30);

setTimeout(()=>d.remove(),1800);
}

}

/* ================= END SCREEN ================= */
function end(){

setTimeout(()=>{

document.body.innerHTML=`
<div class="end">
<div style="font-size:70px">🥰</div>
<h1>Dhonnobad Dhonnobad</h1>
<p>DM e Number dicchi 🥰👍</p>
<p style="margin-top:10px;font-size:18px;opacity:0.8">
(You received dua 🥰)
</p>
</div>
`;

},800);

}

/* ================= START ================= */
step1();

</script>

</body>
</html>
