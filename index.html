<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-repeat:repeat;
background-size:420px;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
overflow:hidden;
position:relative;
}

.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:22px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#ff8ad8,#ffd166);
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:bold;
margin-right:15px;
}

.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
margin:12px 0;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

.bubble{
padding:14px 18px;
border-radius:20px;
max-width:75%;
color:white;
}

.left .bubble{background:#202c33;}
.right .bubble{background:#005c4b;}

.options{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
min-height:220px;
position:relative;
}

.option-btn{
padding:14px 20px;
border:none;
border-radius:30px;
font-weight:bold;
font-size:18px;
cursor:pointer;
background:#25D366;
transition:0.2s;
}

.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:20px;
}

.shake{animation:shake 0.25s;}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-4px,3px);}
50%{transform:translate(4px,-3px);}
75%{transform:translate(-3px,2px);}
100%{transform:translate(0,0);}
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
opacity:0;
pointer-events:none;
z-index:9999;
}

.flash.active{animation:flash 0.3s;}

@keyframes flash{
0%{opacity:0;}
50%{opacity:0.4;}
100%{opacity:0;}
}

.end{
position:fixed;
inset:0;
background:linear-gradient(135deg,#0b141a,#111b21);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:99999;
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<div class="chat-container">
<div class="header">
<div class="profile">💖</div>
Eid Chat
</div>

<div class="chat-box" id="chatBox"></div>
<div class="step" id="step">Step 1/4</div>
</div>

<script>

/* SONG */
const bg=new Audio("https://files.catbox.moe/sauxt7.mp3");
bg.loop=true;
bg.volume=0.35;

window.addEventListener("load",()=>bg.play().catch(()=>{}));
document.body.addEventListener("click",()=>bg.play().catch(()=>{}),{once:true});

/* ELEMENTS */
const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

/* AUDIO ENGINE */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(t){
const o=ctx.createOscillator();
const g=ctx.createGain();
o.connect(g); g.connect(ctx.destination);

if(t==="ding") o.frequency.value=800;
if(t==="woosh") o.frequency.value=300;
if(t==="buzz") o.frequency.value=120;

g.gain.value=0.05;

o.start();
o.stop(ctx.currentTime+0.12);
}

/* VIBRATION */
function vibrate(t){
if(!navigator.vibrate) return;
if(t==="light") navigator.vibrate(15);
if(t==="strong") navigator.vibrate([50,80,50]);
}

/* TOAST */
function toast(t){
const d=document.createElement("div");
d.innerText=t;
d.style.cssText=`
position:fixed;top:20px;left:50%;
transform:translateX(-50%);
background:#ff3b3b;color:white;
padding:10px 16px;border-radius:20px;
z-index:99999;font-weight:bold;
`;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1200);
}

/* MESSAGE */
function msg(text,side){

const r=document.createElement("div");
r.className=`message-row ${side}`;

const b=document.createElement("div");
b.className="bubble";

if(side==="right"){
b.innerHTML=text+"<br><span style='color:#53bdeb;font-size:12px'>✓✓</span>";
sound("woosh");
vibrate("light");
}else{
b.innerText=text;
sound("ding");
}

r.appendChild(b);
chatBox.appendChild(r);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* BUTTON */
function btn(t,f){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=t;
b.onclick=f;
return b;
}

/* OPTIONS */
function add(o){
const w=document.createElement("div");
w.className="options";
o.forEach(x=>w.appendChild(x));
chatBox.appendChild(w);
}

/* CLEAR */
function clear(){
document.querySelectorAll(".options").forEach(e=>e.remove());
}

/* SAFE RUNAWAY */
function runaway(btn,fn){

btn.style.position="absolute";
btn.onclick=fn;

btn.onmouseenter=move;
btn.ontouchstart=move;

function move(){

let x,y;
do{
x=Math.random()*280;
y=Math.random()*150;
}while(x<150 && y<100);

btn.style.left=x+"px";
btn.style.top=y+"px";

sound("woosh");
vibrate("light");
}

}

/* STEP 1 */
function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const a=btn("Eid Mubarak",()=>next1());
a.style.background="#4d96ff";

const b=btn("Same to you",()=>runaway(b,next1));
b.style.background="#ff6b6b";

add([a,b]);
}

/* STEP 1 NEXT (typing) */
function next1(){

msg("Eid Mubarak 😌","right");
clear();

typing(()=>{
msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");
step2();
});

}

/* TYPING */
function typing(cb){

const d=document.createElement("div");
d.className="message-row left";
d.innerHTML=`<div class="bubble">typing... ●●●</div>`;
chatBox.appendChild(d);

setTimeout(()=>{
d.remove();
cb();
},900);

}

/* STEP 2 */
function step2(){

step.innerText="Step 2/4";

const a=btn("Kisher Salami?",()=>{});
const b=btn("Tumi Amare Diba",()=>{});
const c=btn("Accha Dicchi 😊👍",()=>{
msg("Accha Dicchi 😊👍","right");
clear();
setTimeout(step3,700);
});

a.style.background="#ff6b6b";
b.style.background="#4d96ff";
c.style.background="#6bff95";

runaway2(a);
runaway2(b);

add([a,b,c]);
}

function runaway2(b){
b.onmouseenter=()=>{
b.style.transform=`translate(${(Math.random()-0.5)*160}px,${(Math.random()-0.5)*100}px)`;
};
}

/* STEP 3 */
function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const a=btn("10 TK",wrong);
const b=btn("50 TK",wrong);
const c=btn("No salami❌👎",wrong);

const big=btn("500 TK 😡",()=>{
msg("500 TK 😡","right");
clear();
confetti();
end();
});

big.style.background="#ff2e63";
big.style.color="white";

add([a,b,c,big]);

grow(big);
}

let growVal=1;
let growInt;

function grow(b){

growVal=1;
growInt=setInterval(()=>{

growVal+=0.01;

b.style.transform=`scale(${growVal})`;

document.querySelectorAll(".option-btn").forEach(x=>{
if(x!==b){
x.style.opacity=Math.max(0.2,1-growVal/6);
x.style.transform="scale(0.85)";
}
});

},500);

}

function wrong(){
toast("Wrong option 😡");
flash();
vibrate("strong");
sound("buzz");
}

/* FLASH */
function flash(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),250);
}

/* CONFETTI */
function confetti(){

const cx=innerWidth/2;
const cy=innerHeight/2;

for(let i=0;i<90;i++){

const d=document.createElement("div");
d.innerText=["🎉","✨","🎊"][Math.random()*3|0];
d.style.position="fixed";
d.style.left=cx+"px";
d.style.top=cy+"px";
d.style.fontSize="18px";
document.body.appendChild(d);

const a=Math.random()*Math.PI*2;
const r=220+Math.random()*200;

setTimeout(()=>{
d.style.transition="1.5s";
d.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;
d.style.opacity="0";
},30);

setTimeout(()=>d.remove(),2000);
}

}

/* END */
function end(){

setTimeout(()=>{

document.body.innerHTML=`
<div class="end">
<div style="font-size:70px">🥰</div>
<h1>Dhonnobad Dhonnobad</h1>
<p>DM e Number dicchi 🥰👍</p>
</div>
`;

},800);

}

/* START */
step1();

</script>

</body>
</html>
