<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid er Chand Aakashe 🌙</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;

background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:350px;
background-repeat:repeat;
}

/* ================= LOADING ================= */

#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#0f1720);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
transition:1s ease;
}

.loader-circle{
width:90px;
height:90px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.08);
border-top:5px solid white;
animation:spin 1s linear infinite;
margin-bottom:30px;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.loading-text{
color:white;
font-size:25px;
font-weight:bold;
margin-bottom:18px;
}

.volume-tip{
color:white;
font-size:16px;
opacity:0;
animation:fadeIn 1s forwards;
animation-delay:1.2s;
margin-top:10px;
}

.tap-text{
margin-top:25px;
font-size:18px;
font-weight:bold;
color:white;
opacity:0;
animation:fadeIn 1s forwards;
animation-delay:2.5s;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* ================= CHAT ================= */

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,1);
overflow:hidden;
position:relative;
display:none;
}

/* ================= HEADER ================= */

.header{
height:78px;
display:flex;
align-items:center;
padding:14px;
color:white;
position:relative;
overflow:hidden;
background:#202c33;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
margin-right:12px;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
background-position:center;
border:2px solid rgba(255,255,255,0.2);
}

.title{
font-size:20px;
font-weight:bold;
}

.sub-title{
font-size:12px;
opacity:0.7;
margin-top:2px;
}

/* ================= CHAT ================= */

.chat-box{
height:calc(100vh - 78px);
overflow-y:auto;
padding:20px 12px 120px;
scroll-behavior:smooth;
}

/* ================= OPTIONS (FIXED) ================= */

.options{
position:relative;
height:340px;
margin-top:20px;

display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
gap:8px;
padding:10px;
}

/* ================= BUTTONS (FIXED) ================= */

.option-btn{
padding:8px 12px;
border:none;
border-radius:16px;
font-size:12px;
font-weight:800;
cursor:pointer;
transition:0.3s ease;
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.25);

min-width:70px;
text-align:center;
}

/* 500 TK BIG BUTTON */
.option-btn.big{
transform:scale(1.15);
background:#ffcc00 !important;
color:#000;
z-index:10;
}

/* ================= STEP ================= */

.progress-wrap{
position:fixed;
bottom:15px;
right:15px;
z-index:9999;
}

.step{
background:rgba(0,0,0,0.6);
color:white;
padding:8px 14px;
border-radius:20px;
font-size:14px;
}

/* ================= END SCREEN ================= */

#endScreen{
position:fixed;
inset:0;
display:none;
background:url("https://files.catbox.moe/q1u4wp.jpg") center/cover no-repeat;
z-index:99999;
}

/* ================= TOAST ================= */

.toast{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
background:#ff2d2d;
color:white;
padding:12px 18px;
border-radius:22px;
font-weight:bold;
z-index:999999;
animation:toastAnim 1.2s ease;
}

@keyframes toastAnim{
0%{opacity:0;transform:translate(-50%,-15px);}
20%{opacity:1;}
100%{opacity:0;transform:translate(-50%,-35px);}
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://files.catbox.moe/sauxt7.mp3" type="audio/mpeg">
</audio>

<!-- STEP -->
<div class="progress-wrap">
  <div class="step" id="stepText">Step 1/3</div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loader-circle"></div>
  <div class="loading-text">Loading Eid Surprise...</div>
  <div class="volume-tip">Turn on volume 🔊</div>
  <div class="tap-text">Tap anywhere to continue</div>
</div>

<!-- CHAT -->
<div class="chat-container" id="chat">

  <div class="header">
    <div class="profile"></div>
    <div>
      <div class="title">Eid Message</div>
      <div class="sub-title">Special surprise 🌙</div>
    </div>
  </div>

  <div class="chat-box">

    <div class="options">
      <button class="option-btn">10 Taka</button>
      <button class="option-btn">50 Taka</button>
      <button class="option-btn big">500 Taka 💛</button>
      <button class="option-btn">100 Taka</button>
    </div>

  </div>

</div>

<!-- END SCREEN -->
<div id="endScreen"></div>

<script>

/* MUSIC FIX (starts from beginning) */
const music = document.getElementById("bgMusic");

function startMusic(){
  music.currentTime = 0;
  music.play().catch(()=>{});
}

/* START ON FIRST TAP */
document.addEventListener("click", ()=>{
  startMusic();
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("chat").style.display="block";
},{once:true});

document.addEventListener("touchstart", ()=>{
  startMusic();
},{once:true});

/* STEP (unchanged logic) */
const stepText = document.getElementById("stepText");
stepText.innerText = "Step 1/3";

/* BUTTON PUSH EFFECT */
const bigBtn = document.querySelector(".option-btn.big");
const others = document.querySelectorAll(".option-btn:not(.big)");

bigBtn.addEventListener("mouseenter", ()=>{
  others.forEach(b=>{
    b.style.transform = "translateX(8px) scale(0.85)";
    b.style.opacity = "0.55";
  });
});

bigBtn.addEventListener("mouseleave", ()=>{
  others.forEach(b=>{
    b.style.transform = "scale(1)";
    b.style.opacity = "1";
  });
});

</script>

</body>
</html>
