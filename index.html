<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid er Chand Aakashe 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#0b141a;
background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:350px;
background-repeat:repeat;
}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#0f1720);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
}

.loader-circle{
width:90px;height:90px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.08);
border-top:5px solid white;
animation:spin 1s linear infinite;
margin-bottom:30px;
}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.loading-text{color:white;font-size:24px;font-weight:bold;margin-bottom:25px;}

.volume-tip{
position:absolute;
bottom:110px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:17px;
text-align:center;
}

.tap-text{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:18px;
font-weight:bold;
}

/* CHAT */
.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,0.82);
backdrop-filter:blur(2px);
overflow:hidden;
display:none;
position:relative;
}

.header{
height:78px;
display:flex;
align-items:center;
padding:14px;
color:white;
background:#202c33;
}

.profile{
width:50px;height:50px;border-radius:50%;
margin-right:12px;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
}

.chat-box{
height:calc(100vh - 78px);
overflow-y:auto;
padding:20px 12px 120px;
}

/* UI */
.option-btn{
position:absolute;
padding:14px 20px;
border:none;
border-radius:28px;
color:white;
cursor:pointer;
transition:top .2s,left .2s;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
color:white;
padding:10px 16px;
border-radius:20px;
z-index:999999;
animation:drop 1.2s ease;
}

@keyframes drop{
0%{transform:translate(-50%,-20px);opacity:0}
20%{opacity:1}
100%{transform:translate(-50%,0);opacity:0}
}

.heehee{
position:fixed;
bottom:-50px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.12);
padding:10px 18px;
border-radius:20px;
color:white;
transition:.3s;
}

.shake{animation:shake .25s}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(-6px,3px)}
50%{transform:translate(6px,-3px)}
75%{transform:translate(-4px,2px)}
100%{transform:translate(0,0)}
}

.typing{display:flex;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:white;animation:bounce 1s infinite}
@keyframes bounce{
0%,80%,100%{transform:scale(.6);opacity:.5}
40%{transform:scale(1);opacity:1}
}

/* IMPORTANT FIX */
.pointer{
pointer-events:none;
user-select:none;
}
</style>
</head>

<body>

<div id="loadingScreen">
<div class="loader-circle"></div>
<div class="loading-text">Loading Eid Experience...</div>
<div class="volume-tip">🔊 Increase volume for better experience</div>
<div class="tap-text">Tap / Click To Start</div>
</div>

<div class="chat-container">
<div class="header">
<div class="profile"></div>
<div>
<div class="title">Eid er Chand Aakashe 🌙</div>
<div class="sub-title">online</div>
</div>
</div>

<div class="chat-box" id="chatBox"></div>
</div>

<audio id="bgMusic" loop>
<source src="https://files.catbox.moe/sauxt7.mp3">
</audio>

<script>

const music=document.getElementById("bgMusic");
const loading=document.getElementById("loadingScreen");
const chat=document.getElementById("chatBox");

let started=false;

/* FIXED START */
function start(){
if(started) return;
started=true;

loading.style.opacity="0";
loading.style.pointerEvents="none";

document.querySelector(".chat-container").style.display="block";

/* IMPORTANT: audio MUST be inside user gesture */
music.volume=0.4;
music.play().catch(()=>{});

setTimeout(()=>{
loading.remove();
step1();
},400);
}

/* FIX: best mobile support */
loading.addEventListener("pointerdown",start);

/* CHAT */
function msg(text,side){
const r=document.createElement("div");
r.style.margin="10px 0";
r.style.textAlign=side==="right"?"right":"left";

r.innerHTML=`
<div style="display:inline-block;background:${side==="right"?"#005c4b":"#202c33"};color:white;padding:10px 14px;border-radius:18px;max-width:75%">
${text}
<div style="font-size:10px;opacity:.7;margin-top:4px">${new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
</div>
`;

chat.appendChild(r);
chat.scrollTop=chat.scrollHeight;
}

/* TOAST */
function toast(t){
const d=document.createElement("div");
d.className="toast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1200);
}

/* HEEHEE */
function hee(){
const h=document.createElement("div");
h.className="heehee";
h.innerText="HeeHee 🤭";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1200);
}

/* STEP 1 */
function step1(){

msg("Assalamu Alaikum Eid Mubarak","left");

const a=document.createElement("button");
a.className="option-btn";
a.innerText="Eid Mubarak";
a.style.left="20px";
a.style.top="120px";
a.style.background="#4d96ff";

const b=document.createElement("button");
b.className="option-btn pointer";
b.innerText="Same to you";
b.style.left="200px";
b.style.top="220px";
b.style.background="#ff6b6b";

/* RUN AWAY FIXED (less jitter) */
b.onmouseenter=()=>{
toast("Wrong option");
hee();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);

b.style.left=Math.random()*220+"px";
b.style.top=Math.random()*250+"px";
};

a.onclick=()=>{
msg("Eid Mubarak 😌","right");
clear();
setTimeout(step2,700);
};

chat.appendChild(a);
chat.appendChild(b);
}

/* CLEAR */
function clear(){
document.querySelectorAll(".option-btn").forEach(e=>e.remove());
}

/* STEP 2 */
function step2(){

msg("Dhonnobad Dhonnobad. Salamita 💁‍♂️","left");

const a=btn("Amare tumi diba",run);
const b=btn("Kisher salami 😡",run);
const c=btn("Accha dicchi",()=>{
msg("Accha dicchi 😊","right");
clear();
setTimeout(step3,600);
});

chat.appendChild(a);
chat.appendChild(b);
chat.appendChild(c);
}

function btn(t,fn){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=t;
b.style.background="#4d96ff";
b.onmouseenter=fn;
b.ontouchstart=fn;
return b;
}

function run(){
toast("Wrong option");
hee();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
}

/* STEP 3 */
function step3(){

msg("Dhonnobad Dhonnobad","left");

const a=btn("No Salami",run);
const b=btn("10 Taka",run);

const big=document.createElement("button");
big.className="option-btn";
big.innerText="500 Taka 😡";
big.style.background="red";
big.style.left="120px";
big.style.top="300px";
big.style.transform="scale(.5)";

let scale=.5;

setInterval(()=>{
scale+=0.03;
big.style.transform=`scale(${scale})`;
},250);

big.onclick=()=>{
clear();
showEnd();
};

chat.appendChild(a);
chat.appendChild(b);
chat.appendChild(big);
}

/* END */
function showEnd(){
document.body.innerHTML=`
<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white">
<h1>🥰 Dhonnobad Dhonnobad</h1>
<p>I receive — Salami 💸<br>You receive — Dua 🤲</p>
</div>
`;
}

</script>
</body>
</html>
