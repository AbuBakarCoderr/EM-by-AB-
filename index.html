<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid er Chand Aakashe 🌙</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#0b141a;
background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:350px;
background-repeat:repeat;
color:white;
}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#0f1720);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999999;
}

.loader-circle{
width:90px;height:90px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.1);
border-top:5px solid white;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{font-size:22px;margin-bottom:10px}
.tap-text{margin-top:20px;opacity:0.8}

/* CHAT */
.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,0.92);
backdrop-filter:blur(6px);
display:none;
overflow:hidden;
}

.header{
display:flex;
align-items:center;
padding:12px;
background:#202c33;
}

.profile{
width:45px;height:45px;
border-radius:50%;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_");
background-size:cover;
margin-right:10px;
}

.title{font-weight:bold}
.sub{font-size:12px;opacity:0.7}

.chat-box{
height:calc(100vh - 70px);
overflow-y:auto;
padding:15px;
}

.message-row{margin:10px 0;display:flex;flex-direction:column}
.left{align-items:flex-start}
.right{align-items:flex-end}

.bubble{
padding:12px 16px;
border-radius:18px;
max-width:75%;
}

.left .bubble{background:#202c33}
.right .bubble{background:#005c4b}

.option-btn{
position:absolute;
padding:14px 20px;
border:none;
border-radius:25px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.step{
position:fixed;
bottom:10px;
right:10px;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:20px;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:10px 15px;
border-radius:20px;
z-index:999999;
}

.shake{animation:shake 0.3s}
@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-5px)}
50%{transform:translate(5px)}
75%{transform:translate(-5px)}
100%{transform:translate(0)}
}

</style>
</head>

<body>

<div id="loadingScreen">
<div class="loader-circle"></div>
<div class="loading-text">Loading Eid Experience...</div>
<div>🔊 Increase volume for better experience</div>
<div class="tap-text">Tap to start</div>
</div>

<div class="chat-container">

<div class="header">
<div class="profile"></div>
<div>
<div class="title">Eid er Chand Aakashe 🌙</div>
<div class="sub">online</div>
</div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="step" id="step">Step 1</div>

</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/sauxt7.mp3">
</audio>

<script>

const loading = document.getElementById("loadingScreen");
const chat = document.querySelector(".chat-container");
const box = document.getElementById("chatBox");
const step = document.getElementById("step");
const music = document.getElementById("music");

let started=false;

/* START */
function start(){
if(started) return;
started=true;

loading.style.display="none";
chat.style.display="block";

music.volume=0.4;
music.play();

step1();
}

/* ONLY SAFE TRIGGER */
loading.addEventListener("pointerdown",start,{once:true});

/* CHAT */
function msg(text,side){
const r=document.createElement("div");
r.className="message-row "+side;

const b=document.createElement("div");
b.className="bubble";
b.innerText=text;

r.appendChild(b);
box.appendChild(r);
box.scrollTop=box.scrollHeight;
}

/* STEP 1 */
function step1(){
step.innerText="Step 1";

msg("Assalamu Alaikum Eid Mubarak","left");

setTimeout(()=>{

const btn=document.createElement("button");
btn.innerText="Eid Mubarak";
btn.className="option-btn";
btn.style.left="20px";
btn.style.top="200px";
btn.style.background="#4d96ff";

const run=document.createElement("button");
run.innerText="Same to you";
run.className="option-btn";
run.style.left="200px";
run.style.top="250px";
run.style.background="#ff6b6b";

run.onmouseenter=()=>{run.style.left=Math.random()*200+"px";run.style.top=Math.random()*300+"px"};

btn.onclick=()=>{
msg("Eid Mubarak 😌","right");
step2();
};

document.body.appendChild(btn);
document.body.appendChild(run);

},800);
}

/* STEP 2 */
function step2(){
step.innerText="Step 2";

msg("Kisher Salami?","left");

}

/* (rest steps you already had — can expand later) */

</script>

</body>
</html>
