<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid er Chand Aakashe 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:300px;
}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#111827);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
text-align:center;
gap:10px;
padding:20px;
}

.loader{
width:70px;
height:70px;
border:5px solid rgba(255,255,255,0.1);
border-top:5px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{to{transform:rotate(360deg)}}

.loading-msg{
opacity:0.9;
font-size:15px;
}

/* CHAT */
.chat{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,0.85);
backdrop-filter:blur(4px);
display:none;
flex-direction:column;
}

.header{
height:70px;
display:flex;
align-items:center;
padding:10px;
background:#202c33;
color:white;
}

.pfp{
width:45px;
height:45px;
border-radius:50%;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
margin-right:10px;
}

.title{font-size:16px;font-weight:bold;}
.sub{font-size:12px;opacity:0.7;}

.box{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* MESSAGE ALIGNMENT FIX */
.msg{
margin:8px 0;
max-width:80%;
padding:10px;
border-radius:10px;
color:white;
font-size:14px;
word-wrap:break-word;
}

.left{
background:#202c33;
align-self:flex-start;
border-top-left-radius:2px;
}

.right{
background:#005c4b;
align-self:flex-end;
border-top-right-radius:2px;
}

/* OPTIONS (clean layout) */
.options{
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
width:100%;
}

.btn{
padding:12px 14px;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

/* ARROW */
.arrow{
font-size:13px;
color:#fff;
opacity:0.8;
margin-bottom:5px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(5px)}
}

/* STEP */
.step{
position:fixed;
bottom:15px;
right:15px;
color:white;
font-size:13px;
background:rgba(0,0,0,0.4);
padding:6px 10px;
border-radius:10px;
}

/* SHAKE */
.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(-5px,3px)}
50%{transform:translate(5px,-3px)}
75%{transform:translate(-3px,2px)}
100%{transform:translate(0,0)}
}

/* END */
.end{
position:fixed;
inset:0;
background:radial-gradient(circle,#1f2937,#000);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:99999;
text-align:center;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
<div class="loader"></div>
<div class="loading-msg">Loading Eid Experience...</div>
<div class="loading-msg">Increase volume for better experience 🔊</div>
<div class="loading-msg">Tap anywhere to start 👇</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">

<div class="header">
<div class="pfp"></div>
<div>
<div class="title">Eid er Chand Aakashe 🌙</div>
<div class="sub">online</div>
</div>
</div>

<div class="box" id="box"></div>
</div>

<div class="step" id="step">Step 1/3</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/sauxt7.mp3">
</audio>

<script>

const loading=document.getElementById("loadingScreen");
const chat=document.getElementById("chat");
const box=document.getElementById("box");
const stepEl=document.getElementById("step");
const music=document.getElementById("music");

let step=1;
let started=false;

/* START */
loading.addEventListener("click",start);
loading.addEventListener("touchstart",start);

function start(){
if(started) return;
started=true;

music.play().catch(()=>{});

loading.style.display="none";
chat.style.display="flex";

step1();
}

/* MESSAGE */
function msg(text,side){
const d=document.createElement("div");
d.className="msg "+side;
d.innerHTML=text;
box.appendChild(d);
box.scrollTop=box.scrollHeight;
}

/* STEP */
function setStep(n){
step=n;
stepEl.innerText=`Step ${n}/3`;
}

/* STEP 1 */
function step1(){
setStep(1);

msg("Assalamu Alaikum Eid Mubarak","left");

const wrap=document.createElement("div");
wrap.className="options";

/* arrow (NOT clickable) */
const arrow=document.createElement("div");
arrow.className="arrow";
arrow.innerText="👇 press here → Same to you";

const a=document.createElement("button");
a.className="btn";
a.innerText="Eid Mubarak 👍";
a.style.background="#22c55e";

const b=document.createElement("button");
b.className="btn";
b.innerText="Same to you";
b.style.background="#ef4444";

b.onmouseover=runAway;
b.ontouchstart=runAway;

function runAway(){
b.style.transform="translateX(40px)";
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
}

a.onclick=()=>{
msg("Eid Mubarak 👍","right");
wrap.remove();
setTimeout(step2,700);
};

wrap.appendChild(arrow);
wrap.appendChild(a);
wrap.appendChild(b);

box.appendChild(wrap);
}

/* STEP 2 */
function step2(){
setStep(2);

msg("Dhonnobad Dhonnobad, salamita💁‍♂️","left");

const wrap=document.createElement("div");
wrap.className="options";

function make(text,color,good=false){
const b=document.createElement("button");
b.className="btn";
b.innerText=text;
b.style.background=color;

if(!good){
b.onmouseover=run;
b.onclick=run;

function run(){
b.style.transform="translateX(30px)";
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
}
}

if(good){
b.onclick=()=>{
msg(text,"right");
wrap.remove();
setTimeout(step3,700);
};
}

return b;
}

wrap.appendChild(make("Amare Tumi diba", "#3b82f6"));
wrap.appendChild(make("Kisher salami 😡", "#ef4444"));
wrap.appendChild(make("Accha dicchi 👍", "#22c55e", true));

box.appendChild(wrap);
}

/* STEP 3 */
function step3(){
setStep(3);

msg("Dhonnobad Dhonnobad, ta koto?","left");

const wrap=document.createElement("div");
wrap.className="options";

function make(text,color,good=false){
const b=document.createElement("button");
b.className="btn";
b.innerText=text;
b.style.background=color;

if(!good){
b.onclick=()=>{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);
}
}

if(good){
let s=0.6;
setInterval(()=>{
s+=0.05;
b.style.transform=`scale(${s})`;
},400);

b.onclick=()=>{
wrap.remove();
end();
};
}

return b;
}

wrap.appendChild(make("10 TK","#3b82f6"));
wrap.appendChild(make("30 TK","#ef4444"));
wrap.appendChild(make("No Salami","#f97316"));
wrap.appendChild(make("500 TK 💸","#22c55e",true));

box.appendChild(wrap);
}

/* END */
function end(){
document.body.innerHTML=`
<div class="end">
<h1>🥰 Dhonnobad Dhonnobad</h1>
<p>I receive Salami 💸<br>You receive Dua 🤲</p>
<small style="opacity:0.4;margin-top:20px;writing-mode:vertical-rl">
Dishting · Dishting
</small>
</div>
`;
}

</script>

</body>
</html>
