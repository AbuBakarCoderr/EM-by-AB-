<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid er Chand Aakashe 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#0b141a;
background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:350px;
background-repeat:repeat;
}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#0f1720);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
}

.loader-circle{
width:90px;
height:90px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.08);
border-top:5px solid white;
animation:spin 1s linear infinite;
margin-bottom:30px;
}

@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{
color:white;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.volume-tip{
color:white;
font-size:14px;
opacity:0.8;
margin-bottom:30px;
text-align:center;
}

.tap-text{
color:white;
font-size:18px;
font-weight:bold;
animation:blink 1.2s infinite;
}

@keyframes blink{50%{opacity:0.4}}

/* CHAT */
.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,0.85);
display:none;
flex-direction:column;
}

.header{
height:78px;
display:flex;
align-items:center;
padding:14px;
color:white;
background:#202c33;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
margin-right:12px;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
}

.title{font-size:18px;font-weight:bold}
.sub-title{font-size:12px;opacity:0.7}

.chat-box{
flex:1;
overflow-y:auto;
padding:15px;
}

/* messages */
.message{
margin:10px 0;
max-width:80%;
padding:10px 14px;
border-radius:12px;
color:white;
font-size:14px;
}

.left{background:#202c33;border-bottom-left-radius:4px}
.right{background:#005c4b;margin-left:auto;border-bottom-right-radius:4px}

.time{
font-size:10px;
opacity:0.7;
margin-top:5px;
}

/* options */
.options{position:relative;height:220px;margin-top:10px}

.btn{
position:absolute;
padding:12px 16px;
border-radius:20px;
border:none;
color:white;
cursor:pointer;
transition:0.15s;
}

/* step */
.step{
position:fixed;
bottom:12px;
right:12px;
color:white;
font-size:13px;
background:rgba(0,0,0,0.4);
padding:6px 10px;
border-radius:12px;
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
color:white;
padding:10px 16px;
border-radius:20px;
font-weight:bold;
}

.hehe{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
background:rgba(255,255,255,0.1);
padding:8px 14px;
border-radius:20px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
<div class="loader-circle"></div>
<div class="loading-text">Loading Eid Experience...</div>
<div class="volume-tip">🔊 Increase volume for better experience</div>
<div class="tap-text">Tap / Click to Start</div>
</div>

<!-- CHAT -->
<div class="chat-container">
<div class="header">
<div class="profile"></div>
<div>
<div class="title">Eid er Chand Aakashe 🌙</div>
<div class="sub-title">online</div>
</div>
</div>

<div class="chat-box" id="chatBox"></div>
<div class="step" id="step">Step 1/4</div>
</div>

<audio id="bgMusic" loop>
<source src="https://files.catbox.moe/sauxt7.mp3">
</audio>

<script>

const loading = document.getElementById("loadingScreen");
const chat = document.querySelector(".chat-container");
const chatBox = document.getElementById("chatBox");
const step = document.getElementById("step");
const music = document.getElementById("bgMusic");

let started = false;

/* FIXED START (ROBUST) */
function start(){
if(started) return;
started = true;

loading.style.display="none";
chat.style.display="flex";

music.volume = 0.4;
music.play().catch(()=>{});

step1();
}

/* IMPORTANT: works everywhere */
document.addEventListener("pointerdown", start, {once:true});

/* CHAT HELPERS */
function msg(text, side){
const div = document.createElement("div");
div.className = "message "+side;
div.innerHTML = text + `<div class="time">${new Date().toLocaleTimeString()}</div>`;
chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;
}

/* STEP 1 */
function step1(){
step.innerText="Step 1/4";

msg("Assalamu Alaikum Eid Mubarak","left");

setTimeout(()=>{
msg("Eid Mubarak 😌","right");
step2();
},800);
}

/* STEP 2 */
function step2(){
step.innerText="Step 2/4";

msg("Dhonnobad Dhonnobad. Salamita? 💁‍♂️","left");

const wrap = document.createElement("div");
wrap.className="options";

const a = btn("Eid Mubarak","#4d96ff",120,30,()=>{
msg("Eid Mubarak","right");
wrap.remove();
step3();
});

const b = btn("Same to you","#ff6b6b",20,80,runAway);

wrap.appendChild(a);
wrap.appendChild(b);
chatBox.appendChild(wrap);

/* runaway logic bounded */
function runAway(){
toast("Wrong option");
hehe();

let x = Math.random()*200+20;
let y = Math.random()*100+20;

b.style.left=x+"px";
b.style.top=y+"px";
}
}

/* STEP 3 */
function step3(){
step.innerText="Step 3/4";

msg("Dhonnobad Dhonnobad","left");

const wrap=document.createElement("div");
wrap.className="options";

const a=btn("10 Taka","#6c63ff",20,30,wrong);
const b=btn("No Salami","#6c63ff",160,30,wrong);

const big=btn("500 Taka","#ff0055",80,120,()=>{
msg("500 Taka 😌","right");
wrap.remove();
end();
});

let scale=0.5;

setInterval(()=>{
scale+=0.1;
big.style.transform=`scale(${scale})`;
},400);

wrap.append(a,b,big);
chatBox.appendChild(wrap);

function wrong(){
toast("Wrong option");
hehe();
}
}

/* END */
function end(){
step.innerText="Done";
msg("I received Salami 💸 You received Dua 🤲","left");
}

/* BUTTON */
function btn(text,color,x,y,fn){
const b=document.createElement("button");
b.className="btn";
b.innerText=text;
b.style.background=color;
b.style.left=x+"px";
b.style.top=y+"px";
b.onclick=fn;
return b;
}

/* UI FEEDBACK */
function toast(t){
const d=document.createElement("div");
d.className="toast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}

function hehe(){
const d=document.createElement("div");
d.className="hehe";
d.innerText="HeeHee 🤭";
document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}

</script>

</body>
</html>
