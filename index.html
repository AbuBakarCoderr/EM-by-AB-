<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Chat Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
height:100vh;
overflow:hidden;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
}

/* LOADING */
#loading{
position:fixed;
inset:0;
background:#05070a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9999;
}

.loader{
width:80px;height:80px;
border:4px solid #333;
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{100%{transform:rotate(360deg)}}

.tap{margin-top:20px;opacity:0.7}

.tip{
margin-top:10px;
opacity:0;
transition:1s;
}

/* CHAT */
#app{
display:none;
width:100%;
max-width:420px;
height:100vh;
background:#111b21;
flex-direction:column;
}

.header{
height:70px;
background:#202c33;
display:flex;
align-items:center;
padding:10px;
color:white;
}

.pfp{
width:45px;height:45px;border-radius:50%;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_");
background-size:cover;
margin-right:10px;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
max-width:75%;
padding:10px 14px;
margin:8px 0;
border-radius:10px;
color:white;
opacity:0;
transform:translateY(10px);
animation:pop .25s forwards;
}

@keyframes pop{
to{opacity:1;transform:translateY(0)}
}

.left{background:#202c33}
.right{background:#005c4b;margin-left:auto}

.time{
font-size:10px;
opacity:0.6;
margin-top:5px;
display:flex;
gap:3px;
}

.tick{
color:#53bdeb;
}

/* typing */
.typing{
display:flex;
gap:4px;
padding:10px;
}

.dot{
width:6px;height:6px;
background:white;border-radius:50%;
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0.5);opacity:.3}
40%{transform:scale(1);opacity:1}
}

/* buttons */
.options{
position:relative;
height:220px;
margin-top:10px;
}

.btn{
position:absolute;
padding:10px 14px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
transition:.15s;
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:8px 14px;
border-radius:20px;
z-index:99999;
}

.bottomToast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
color:white;
padding:8px 14px;
border-radius:20px;
}

/* shake */
.shake{animation:shake .3s}
@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-5px)}
50%{transform:translate(5px)}
100%{transform:translate(0)}
}

.step{
position:fixed;
bottom:10px;
right:10px;
color:white;
font-size:12px;
opacity:.7;
}
</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
<div>Loading Eid Experience...</div>
<div class="tip" id="tip">Increase volume for better experience</div>
<div class="tap">Tap anywhere to start</div>
</div>

<div id="app">

<div class="header">
<div class="pfp"></div>
<div>
<div>Eid er Chand 🌙</div>
<small>online</small>
</div>
</div>

<div class="chat" id="chat"></div>

<div class="step" id="step">Step 1/4</div>
</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/sauxt7.mp3">
</audio>

<script>

const loading=document.getElementById("loading");
const app=document.getElementById("app");
const chat=document.getElementById("chat");
const music=document.getElementById("music");
const tip=document.getElementById("tip");
const step=document.getElementById("step");

let started=false;

/* start */
document.addEventListener("pointerdown",start,{once:true});

function start(){
if(started)return;
started=true;

loading.style.display="none";
app.style.display="flex";

music.volume=0.4;
music.play().catch(()=>{});

step1();
}

/* utils */
function time(){
return new Date().toTimeString().slice(0,5);
}

function msg(text,side){
const d=document.createElement("div");
d.className="msg "+side;
d.innerHTML=`${text}<div class="time">${time()} <span class="tick">✓✓</span></div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* typing */
function typing(cb){
const t=document.createElement("div");
t.className="typing";
t.innerHTML=`<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
chat.appendChild(t);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
t.remove();
cb();
},1000);
}

/* toast */
function toast(t){
const d=document.createElement("div");
d.className="toast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),900);
}

function bottomToast(t){
const d=document.createElement("div");
d.className="bottomToast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),900);
}

function wrong(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
toast("Wrong option");
bottomToast("HeeHee 🤭");
navigator.vibrate?.(60);
}

/* STEP 1 */
function step1(){
step.innerText="Step 1/4";

msg("Assalamu Alaikum Eid Mubarak","left");

typing(()=>{
msg("Eid Mubarak 😌","right");
step2();
});
}

/* runaway helper */
function runaway(btn,limitY=140){
let x=Math.random()*250;
let y=Math.random()*limitY;

btn.style.left=x+"px";
btn.style.top=y+"px";
}

/* STEP 2 */
function step2(){
step.innerText="Step 2/4";

msg("Dhonnobad Dhonnobad 💁‍♂️","left");

const wrap=document.createElement("div");
wrap.className="options";

const a=button("Eid Mubarak","#4d96ff",20,40,()=>{
wrap.remove();
msg("Eid Mubarak","right");
step3();
});

const b=button("Same to you","#ff6b6b",200,90,()=>{
wrong();
runaway(b);
});

wrap.append(a,b);
chat.appendChild(wrap);

/* keep inside bounds */
setInterval(()=>runaway(b,160),1200);
}

/* STEP 3 */
function step3(){
step.innerText="Step 3/4";

msg("Koto Salami? 😌","left");

const wrap=document.createElement("div");
wrap.className="options";

const a=button("10 TK","#6c63ff",20,30,wrong);
const b=button("No Salami","#6c63ff",160,30,wrong);

const big=button("500 TK","#ff0055",100,120,()=>{
wrap.remove();
msg("500 TK 😍","right");
end();
});

let s=0.4;

setInterval(()=>{
s+=0.08;
big.style.transform=`scale(${s})`;
},400);

wrap.append(a,b,big);
chat.appendChild(wrap);
}

/* END */
function end(){
step.innerText="Done";
msg("I receive Salami 💸 You receive Dua 🤲","left");
}

/* button */
function button(t,c,x,y,fn){
const b=document.createElement("button");
b.className="btn";
b.innerText=t;
b.style.background=c;
b.style.left=x+"px";
b.style.top=y+"px";
b.onclick=fn;
return b;
}

</script>

</body>
</html>
