<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak, Salami??</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-size:420px;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.2s;
}

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
overflow:hidden;
position:relative;
}

.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:20px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
background-position:center;
margin-right:12px;
border:2px solid #ffffff33;
}

.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
flex-direction:column;
margin:10px 0;
}

.left{align-items:flex-start;}
.right{align-items:flex-end;}

.bubble{
padding:12px 16px;
border-radius:18px;
max-width:75%;
color:white;
position:relative;
font-size:15px;
}

.left .bubble{
background:#202c33;
}

.right .bubble{
background:#005c4b;
}

.time{
font-size:10px;
opacity:0.7;
margin-top:4px;
text-align:right;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:20px;
min-height:220px;
position:relative;
}

.option-btn{
padding:12px 18px;
border:none;
border-radius:25px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
transition:0.22s ease;
position:relative;
}

.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:8px 14px;
border-radius:20px;
font-size:14px;
z-index:999;
}

/* shake */
.shake{
animation:shake 0.28s;
}

@keyframes shake{
0%{transform:translate(0,0);}
20%{transform:translate(-6px,4px);}
40%{transform:translate(6px,-4px);}
60%{transform:translate(-5px,3px);}
80%{transform:translate(5px,-3px);}
100%{transform:translate(0,0);}
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff2e2e;
color:white;
padding:12px 18px;
border-radius:20px;
font-weight:bold;
z-index:99999;
animation:fade 1.2s ease;
box-shadow:0 5px 20px rgba(255,0,0,0.3);
}

@keyframes fade{
0%{
opacity:0;
transform:translate(-50%,-15px);
}
20%{
opacity:1;
}
100%{
opacity:0;
transform:translate(-50%,-30px);
}
}

.typing{
display:flex;
gap:4px;
align-items:center;
}

.dot{
width:7px;
height:7px;
background:white;
border-radius:50%;
animation:bounce 1s infinite;
}

.dot:nth-child(2){
animation-delay:0.15s;
}

.dot:nth-child(3){
animation-delay:0.3s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0.7);
opacity:0.5;
}
40%{
transform:scale(1.1);
opacity:1;
}
}

/* end */
.end{
position:fixed;
inset:0;
background:linear-gradient(135deg,#111b21,#0b141a);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
z-index:999999;
animation:endFade 0.7s ease;
}

@keyframes endFade{
from{
opacity:0;
transform:scale(0.92);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<div class="profile"></div>
Eid Mubarak, Salami??
</div>

<div class="chat-box" id="chatBox"></div>

<div class="step" id="step">
Step 1/4
</div>

</div>

<script>

/* ================= SONG ================= */

const bg = new Audio("https://files.catbox.moe/sauxt7.mp3");

bg.loop = true;
bg.volume = 0.35;

window.addEventListener("load",()=>{
bg.play().catch(()=>{});
});

document.body.addEventListener("click",()=>{
bg.play().catch(()=>{});
},{once:true});

/* ================= AUDIO ================= */

const ctx = new (window.AudioContext||window.webkitAudioContext)();

function sound(type){

const o = ctx.createOscillator();
const g = ctx.createGain();

o.connect(g);
g.connect(ctx.destination);

if(type==="ding") o.frequency.value = 800;
if(type==="woosh") o.frequency.value = 300;
if(type==="buzz") o.frequency.value = 120;

g.gain.value = 0.05;

o.start();
o.stop(ctx.currentTime+0.12);

}

/* ================= VIBRATION ================= */

function vibrate(type){

if(!navigator.vibrate) return;

if(type==="correct"){
navigator.vibrate(18);
}

if(type==="wrong"){
navigator.vibrate([90,120,90]);
}

}

/* ================= ELEMENTS ================= */

const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

/* ================= TIME ================= */

function now(){

return new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
});

}

/* ================= MESSAGE ================= */

function msg(text,side){

const row=document.createElement("div");
row.className=`message-row ${side}`;

const bubble=document.createElement("div");
bubble.className="bubble";

if(side==="right"){

bubble.innerHTML=`
${text}
<div class="time">${now()} ✓✓</div>
`;

sound("woosh");
vibrate("correct");

}else{

bubble.innerHTML=`
${text}
<div class="time">${now()}</div>
`;

sound("ding");

}

row.appendChild(bubble);

chatBox.appendChild(row);

chatBox.scrollTop=chatBox.scrollHeight;

}

/* ================= BUTTON ================= */

function btn(text,fn){

const b=document.createElement("button");

b.className="option-btn";
b.innerText=text;

b.onclick=(e)=>{

vibrate("correct");
sound("woosh");

fn(e);

};

return b;

}

/* ================= OPTIONS ================= */

function add(arr){

const wrap=document.createElement("div");

wrap.className="options";

arr.forEach(x=>wrap.appendChild(x));

chatBox.appendChild(wrap);

chatBox.scrollTop=chatBox.scrollHeight;

}

function clear(){

document.querySelectorAll(".options").forEach(e=>e.remove());

}

/* ================= TOAST ================= */

function toast(text){

const t=document.createElement("div");

t.className="toast";
t.innerText=text;

document.body.appendChild(t);

setTimeout(()=>{
t.remove();
},1200);

}

/* ================= WRONG ================= */

function wrong(){

toast("Wrong option 😡");

document.body.classList.add("shake");

setTimeout(()=>{
document.body.classList.remove("shake");
},300);

vibrate("wrong");

sound("buzz");

}

/* ================= TYPING ================= */

function typing(cb){

const row=document.createElement("div");
row.className="message-row left";

row.innerHTML=`
<div class="bubble">
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`;

chatBox.appendChild(row);

chatBox.scrollTop=chatBox.scrollHeight;

setTimeout(()=>{
row.remove();
cb();
},1000);

}

/* ================= STEP 1 ================= */

function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const eid=btn("Eid Mubarak",()=>{

msg("Eid Mubarak 😌","right");

clear();

typing(()=>{

msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");

step2();

});

});

eid.style.background="#4d96ff";
eid.style.position="absolute";
eid.style.left="20px";
eid.style.top="20px";

const same=btn("Same to you",()=>{});

same.style.background="#ff6b6b";
same.style.position="absolute";
same.style.left="220px";
same.style.top="120px";

/* RUNAWAY */

same.onmouseenter=runAway;
same.ontouchstart=runAway;

function runAway(){

const safeZones = [
{x1:0,x2:190,y1:0,y2:100}
];

let x,y,valid=false;

while(!valid){

x=Math.random()*280;
y=Math.random()*160;

valid=true;

safeZones.forEach(z=>{
if(
x>z.x1 &&
x<z.x2 &&
y>z.y1 &&
y<z.y2
){
valid=false;
}
});

}

same.style.left=x+"px";
same.style.top=y+"px";

sound("woosh");

}

add([eid,same]);

}

/* ================= STEP 2 ================= */

function step2(){

step.innerText="Step 2/4";

const a=btn("Kisher Salami?",()=>{});
const b=btn("Tumi Amare Diba",()=>{});

const c=btn("Accha Dicchi 😊👍",()=>{

msg("Accha Dicchi 😊👍","right");

clear();

typing(()=>{
step3();
});

});

a.style.background="#ff6b6b";
b.style.background="#4d96ff";

/* BETTER COLOR */
c.style.background="#ffd166";
c.style.color="#222";

/* smooth playful movement */

makeRunaway(a);
makeRunaway(b);

add([a,b,c]);

}

function makeRunaway(btn){

btn.style.transition="0.22s ease";

btn.onmouseenter=move;
btn.ontouchstart=move;

function move(){

const parent=btn.parentElement;

const maxX=parent.offsetWidth-140;
const maxY=150;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

btn.style.position="absolute";
btn.style.left=x+"px";
btn.style.top=y+"px";

sound("woosh");

}

}

/* ================= STEP 3 ================= */

function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const a=btn("10 TK",wrong);
const b=btn("50 TK",wrong);
const c=btn("No salami❌👎",wrong);

const big=btn("500 TK 😡",()=>{

msg("500 TK 😡","right");

clear();

confetti();

setTimeout(()=>{
end();
},900);

});

a.style.background="#ff6b6b";
b.style.background="#4d96ff";
c.style.background="#555";

big.style.background="#ff0055";
big.style.zIndex="5";

add([a,b,c,big]);

grow(big);

}

/* ================= GROW ================= */

let growVal=1;
let growInt;

function grow(big){

clearInterval(growInt);

growVal=1;

growInt=setInterval(()=>{

growVal+=0.022;

big.style.transform=`scale(${growVal})`;

document.querySelectorAll(".option-btn").forEach(btn=>{

if(btn!==big){

btn.style.transform=`scale(${Math.max(0.4,1-growVal/4)})`;

btn.style.opacity=Math.max(0.15,1-growVal/5);

}

});

if(growVal>14){

big.style.position="fixed";
big.style.inset="0";
big.style.width="100vw";
big.style.height="100vh";
big.style.borderRadius="0";
big.style.fontSize="42px";

}

},350);

}

/* ================= CONFETTI ================= */

function confetti(){

const emojis=["🎉","✨","🎊","💥","💫"];

for(let i=0;i<180;i++){

const d=document.createElement("div");

d.innerText=emojis[Math.random()*emojis.length|0];

d.style.position="fixed";
d.style.left="50%";
d.style.top="50%";
d.style.fontSize=(16+Math.random()*18)+"px";
d.style.zIndex="999999";

document.body.appendChild(d);

const angle=Math.random()*Math.PI*2;
const radius=250+Math.random()*450;

const x=Math.cos(angle)*radius;
const y=Math.sin(angle)*radius;

setTimeout(()=>{

d.style.transition="1.7s cubic-bezier(.2,.8,.2,1)";

d.style.transform=`
translate(${x}px,${y}px)
rotate(${Math.random()*500}deg)
scale(0.2)
`;

d.style.opacity="0";

},20);

setTimeout(()=>{
d.remove();
},1800);

}

document.body.style.transform="scale(1.02)";

setTimeout(()=>{
document.body.style.transform="scale(1)";
},140);

}

/* ================= END ================= */

function end(){

document.body.innerHTML=`

<div class="end">

<div style="font-size:85px">
🥰
</div>

<h1 style="margin-top:15px">
Dhonnobad Dhonnobad
</h1>

<p style="margin-top:15px;font-size:22px">
DM e Number dicchi 🥰👍
</p>

<p style="margin-top:12px;opacity:0.7">
(You received dua 🥹)
</p>

</div>

`;

}

/* ================= START ================= */

step1();

</script>

</body>
</html>
