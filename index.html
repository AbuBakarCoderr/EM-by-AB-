<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid er Chand Aakashe 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#0b141a;
background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
background-size:350px;
background-repeat:repeat;
}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#050505,#0f1720);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
transition:1s ease;
}

.loader-circle{
width:90px;
height:90px;
border-radius:50%;
border:5px solid rgba(255,255,255,0.08);
border-top:5px solid white;
animation:spin 1s linear infinite;
margin-bottom:30px;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.loading-text{
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:25px;
}

.volume-tip{
position:absolute;
bottom:110px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:17px;
text-align:center;
}

.tap-text{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:18px;
font-weight:bold;
}

/* CHAT */
.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:rgba(17,27,33,0.82);
backdrop-filter:blur(2px);
overflow:hidden;
position:relative;
display:none;
}

.header{
height:78px;
display:flex;
align-items:center;
padding:14px;
color:white;
background:#202c33;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
margin-right:12px;
background:url("https://drive.google.com/thumbnail?id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_&sz=w1000");
background-size:cover;
}

.chat-box{
height:calc(100vh - 78px);
overflow-y:auto;
padding:20px 12px 120px;
}

.option-btn{
position:absolute;
padding:14px 20px;
border:none;
border-radius:28px;
color:white;
cursor:pointer;
}

.progress-wrap{
position:fixed;
bottom:15px;
right:15px;
color:white;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
color:white;
padding:10px 16px;
border-radius:20px;
z-index:999999;
animation:drop 1.2s ease;
}

@keyframes drop{
0%{transform:translate(-50%,-20px);opacity:0;}
20%{opacity:1;}
100%{transform:translate(-50%,0px);opacity:0;}
}

.heehee{
position:fixed;
bottom:-40px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.1);
padding:10px 18px;
border-radius:20px;
color:white;
transition:0.4s;
}

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-6px,3px);}
50%{transform:translate(6px,-3px);}
75%{transform:translate(-4px,2px);}
100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div id="loadingScreen">
<div class="loader-circle"></div>
<div class="loading-text">Loading Eid Experience...</div>
<div class="volume-tip">🔊 Increase volume for better experience</div>
<div class="tap-text">Tap / Click To Start</div>
</div>

<div class="chat-container">
<div class="header">
<div class="profile"></div>
<div>
<div class="title">Eid er Chand Aakashe 🌙</div>
<div class="sub-title">online</div>
</div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="progress-wrap">
<div class="step" id="step">Step 1/4</div>
</div>
</div>

<audio id="bgMusic" loop playsinline>
<source src="https://files.catbox.moe/sauxt7.mp3" type="audio/mp3">
</audio>

<script>

const music = document.getElementById("bgMusic");
const loadingScreen = document.getElementById("loadingScreen");
const chatContainer = document.querySelector(".chat-container");
const chatBox = document.getElementById("chatBox");
const step = document.getElementById("step");

let started = false;

/* FIX (IMPORTANT) */
function startExperience(){
if(started) return;
started = true;

loadingScreen.style.opacity = "0";
loadingScreen.style.pointerEvents = "none";

chatContainer.style.display = "block";

music.volume = 0.4;
music.play().catch(()=>{});

setTimeout(()=>{
loadingScreen.remove();
step1();
},500);
}

/* FIXED EVENT HANDLING */
loadingScreen.addEventListener("pointerdown", startExperience);
loadingScreen.addEventListener("click", startExperience);
loadingScreen.addEventListener("touchstart", startExperience);

function setStep(n){
step.innerText = `Step ${n}/4`;
}

function addMessage(text,side){
const row = document.createElement("div");
row.className = "message-row "+side;

const bubble = document.createElement("div");
bubble.className = "bubble";
bubble.innerHTML = text;

row.appendChild(bubble);
chatBox.appendChild(row);
chatBox.scrollTop = chatBox.scrollHeight;
}

/* STEP 1 */
function step1(){
setStep(1);

addMessage("Assalamu Alaikum Eid Mubarak","left");

const a = document.createElement("button");
a.className = "option-btn";
a.innerText = "Eid Mubarak";
a.style.background = "#4d96ff";
a.style.left = "20px";
a.style.top = "120px";

const b = document.createElement("button");
b.className = "option-btn";
b.innerText = "Same to you";
b.style.background = "#ff6b6b";
b.style.left = "200px";
b.style.top = "220px";

const pointer = document.createElement("div");
pointer.innerText = "👇 Press Here";
pointer.className = "option-btn";
pointer.style.background = "transparent";
pointer.style.left = "210px";
pointer.style.top = "170px";

function runAway(){
toast("Wrong option");
heehee();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);

let x = Math.random()*220;
let y = Math.random()*200;
b.style.left = x+"px";
b.style.top = y+"px";
}

b.onmouseenter = runAway;
b.ontouchstart = runAway;

a.onclick = ()=>{
addMessage("Eid Mubarak 😌","right");
clearOptions();
setTimeout(step2,700);
};

chatBox.appendChild(a);
chatBox.appendChild(b);
chatBox.appendChild(pointer);
}

function clearOptions(){
document.querySelectorAll(".option-btn").forEach(e=>e.remove());
}

/* STEP 2 */
function step2(){
setStep(2);

addMessage("Dhonnobad Dhonnobad. Salamita 💁‍♂️","left");

const a = createBtn("Amare tumi diba", runAwayBtn);
const b = createBtn("Kisher salami 😡", runAwayBtn);
const c = createBtn("Accha dicchi", ()=>{
addMessage("Accha dicchi 😊","right");
clearOptions();
setTimeout(step3,700);
});

chatBox.appendChild(a);
chatBox.appendChild(b);
chatBox.appendChild(c);
}

function createBtn(text,fn){
const b = document.createElement("button");
b.className="option-btn";
b.innerText=text;
b.style.background="#4d96ff";

b.onmouseenter=fn;
b.ontouchstart=fn;

return b;
}

function runAwayBtn(){
toast("Wrong option");
heehee();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
}

/* STEP 3 */
function step3(){
setStep(3);

addMessage("Dhonnobad Dhonnobad","left");

const a = createBtn("No Salami", runAwayBtn);
const b = createBtn("10 Taka", runAwayBtn);

const big = document.createElement("button");
big.className="option-btn";
big.innerText="500 Taka 😡";
big.style.background="red";
big.style.left="120px";
big.style.top="300px";
big.style.transform="scale(0.5)";

big.onclick=()=>{
clearOptions();
showEnd();
};

setInterval(()=>{
let scale = parseFloat(big.style.transform.replace(/[^0-9.]/g,"")) || 0.5;
scale += 0.05;
big.style.transform = `scale(${scale})`;
},300);

chatBox.appendChild(a);
chatBox.appendChild(b);
chatBox.appendChild(big);
}

/* END */
function showEnd(){
document.body.innerHTML = `
<div style="color:white;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column">
<h1>🥰 Dhonnobad</h1>
<p>I receive — Salami 💸<br>You receive — Dua 🤲</p>
</div>
`;
}

/* UI */
function toast(msg){
const t=document.createElement("div");
t.className="toast";
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),1200);
}

function heehee(){
const h=document.createElement("div");
h.className="heehee";
h.innerText="HeeHee 🤭";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1200);
}

</script>

</body>
</html>
