<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid er Chand Aakashe 🌙</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif;
  user-select:none;
  -webkit-user-select:none;
}

body{
  height:100vh;
  height:100dvh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b141a;

  /* RESTORED BACKGROUND */
  background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
  background-size:350px;
  background-repeat:repeat;
}

/* ================= LOADING ================= */

#loadingScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,#050505,#0f1720);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999999;
  transition:opacity .8s ease;
  cursor:pointer;
}

.loader-circle{
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.08);
  border-top:4px solid #00a884;
  animation:spin 1s linear infinite;
  margin-bottom:30px;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.loading-text{
  color:white;
  font-size:22px;
  font-weight:bold;
  margin-bottom:12px;
}

.volume-tip{
  color:#8696a0;
  font-size:14px;
  opacity:0;
  animation:fadeIn 1s forwards;
  animation-delay:.5s;
  margin-top:5px;
}

.tap-text{
  margin-top:35px;
  font-size:18px;
  font-weight:bold;
  color:#00a884;
  opacity:0;
  animation:fadeIn 1s infinite alternate;
  animation-delay:1.2s;
}

@keyframes fadeIn{
  to{opacity:1;}
}

/* ================= CHAT ================= */

.chat-container{
  width:100%;
  max-width:450px;
  height:100vh;
  height:100dvh;
  background:rgba(11,20,26,.95);
  overflow:hidden;
  position:relative;
  display:none;
  border-left:1px solid rgba(255,255,255,.05);
  border-right:1px solid rgba(255,255,255,.05);
}

/* RESTORED CHAT BACKGROUND */

.chat-container::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
  background-size:350px;
  background-repeat:repeat;

  opacity:.08;
  pointer-events:none;
}

.header{
  height:70px;
  display:flex;
  align-items:center;
  padding:14px;
  color:white;
  background:#202c33;
  z-index:10;
  position:relative;
}

.profile{
  width:42px;
  height:42px;
  border-radius:50%;
  margin-right:12px;
  background:#00a884;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

.title{
  font-size:16px;
  font-weight:bold;
}

.sub-title{
  font-size:12px;
  color:#8696a0;
  margin-top:2px;
}

.chat-box{
  height:calc(100% - 70px);
  overflow-y:auto;
  padding:15px 12px 140px;
  scroll-behavior:smooth;
  position:relative;
  z-index:2;
}

.message-row{
  display:flex;
  margin:8px 0;
  animation:messageIn .25s ease forwards;
}

.left{
  justify-content:flex-start;
}

.right{
  justify-content:flex-end;
}

@keyframes messageIn{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.bubble{
  max-width:80%;
  padding:10px 14px;
  border-radius:14px;
  font-size:15px;
  line-height:1.4;
  color:#e9edef;
  word-wrap:break-word;
}

.left .bubble{
  background:#202c33;
  border-top-left-radius:0;
}

.right .bubble{
  background:#005c4b;
  border-top-right-radius:0;
}

.time{
  font-size:10px;
  color:#8696a0;
  margin-top:4px;
  text-align:right;
}

/* ================= OPTIONS ================= */

.options{
  position:relative;
  height:280px;
  margin-top:15px;
  width:100%;
}

.option-btn{
  position:absolute;
  padding:12px 18px;
  border:none;
  border-radius:24px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  transition:left .15s ease,top .15s ease,transform .1s ease;
  color:white;
  box-shadow:0 4px 10px rgba(0,0,0,.3);
  z-index:5;
  touch-action:none;
}

.progress-wrap{
  position:absolute;
  bottom:15px;
  right:15px;
  z-index:99;
}

.step{
  background:rgba(32,44,51,.9);
  color:#00a884;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.pointer{
  position:absolute;
  font-size:14px;
  font-weight:bold;
  color:white;
  background:rgba(0,0,0,.7);
  padding:4px 8px;
  border-radius:4px;
  animation:pointerBounce .8s infinite alternate;
  pointer-events:none;
  z-index:99;
}

@keyframes pointerBounce{
  from{transform:translateY(0);}
  to{transform:translateY(-8px);}
}

/* ================= EFFECTS ================= */

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ea0038;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  font-weight:bold;
  z-index:999999;
  font-size:14px;
  animation:toastAnim 1s ease forwards;
}

@keyframes toastAnim{
  0%{
    opacity:0;
    transform:translate(-50%,-20px);
  }
  15%,85%{
    opacity:1;
    transform:translate(-50%,0);
  }
  100%{
    opacity:0;
    transform:translate(-50%,-20px);
  }
}

.heehee{
  position:fixed;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:white;
  border-radius:25px;
  font-weight:bold;
  z-index:999999;
  transition:.4s cubic-bezier(.18,.89,.32,1.28);
}

.shake{
  animation:shake .25s linear;
}

@keyframes shake{
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-8px,2px);}
  40%{transform:translate(6px,-2px);}
  60%{transform:translate(-4px,1px);}
  80%{transform:translate(4px,-1px);}
}

.typing{
  display:flex;
  align-items:center;
  gap:4px;
  padding:4px 0;
}

.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#8696a0;
  animation:bounce 1.2s infinite;
}

.dot:nth-child(2){
  animation-delay:.15s;
}

.dot:nth-child(3){
  animation-delay:.3s;
}

@keyframes bounce{
  0%,80%,100%{
    transform:scale(.6);
    opacity:.4;
  }
  40%{
    transform:scale(1.2);
    opacity:1;
  }
}

/* ================= END SCREEN ================= */

.end-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,rgba(15,23,42,.95),rgba(2,6,23,.98));
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  text-align:center;
  z-index:999999;
  animation:endFade .5s cubic-bezier(.16,1,.3,1) forwards;
  padding:20px;
}

.end-screen::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:url("https://drive.google.com/thumbnail?id=1C_WMe2IQ1pTLokpRvX7PHvjy_W2V9bWc&sz=w2000");
  background-size:cover;
  background-position:center;

  opacity:.12;
  pointer-events:none;
}

@keyframes endFade{
  from{
    opacity:0;
    transform:scale(.95);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

</style>
</head>

<body>

<!-- RESTORED MUSIC -->

<audio id="bgMusic" loop playsinline preload="auto">
  <source src="https://raw.githubusercontent.com/AbuBakarCoderr/EM-by-AB-/main/Mubarak_Eid_Mubarak_Full_Video_Jeet_Nusrat_Faria_Baba_Yadav_Akassh_Badsha_Bengali_Movie.mp3" type="audio/mpeg">
</audio>

<!-- LOADING -->

<div id="loadingScreen">
  <div class="loader-circle"></div>
  <div class="loading-text">Loading Eid Experience...</div>
  <div class="volume-tip">🔊 Increase volume for a better experience</div>
  <div class="tap-text">Tap anywhere to start</div>
</div>

<!-- CHAT -->

<div class="chat-container">

  <div class="header">
    <div class="profile">🌙</div>

    <div>
      <div class="title">Eid er Chand Aakashe 🌙</div>
      <div class="sub-title">online</div>
    </div>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="progress-wrap">
    <div class="step" id="step">Step 1/4</div>
  </div>

</div>

<script>

const music=document.getElementById("bgMusic");
const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");
const loadingScreen=document.getElementById("loadingScreen");

/* ================= START ================= */

loadingScreen.addEventListener("click",startExperience);
loadingScreen.addEventListener("touchstart",startExperience,{passive:true});

function startExperience(){

  loadingScreen.removeEventListener("click",startExperience);
  loadingScreen.removeEventListener("touchstart",startExperience);

  music.volume=.55;

  const playPromise=music.play();

  if(playPromise!==undefined){
    playPromise
      .then(()=>{
        console.log("Music started");
      })
      .catch((err)=>{
        console.log("Playback blocked:",err);
      });
  }

  loadingScreen.style.opacity="0";
  loadingScreen.style.pointerEvents="none";

  document.querySelector(".chat-container").style.display="block";

  setTimeout(()=>{
    loadingScreen.remove();
    step1();
  },700);
}

function setStep(num){
  step.innerText=`Step ${num}/4`;
}

function now(){
  return new Date().toLocaleTimeString([],{
    hour:"2-digit",
    minute:"2-digit"
  });
}

function toast(text){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=text;
  document.body.appendChild(t);

  setTimeout(()=>{
    t.remove();
  },1000);
}

function heehee(){
  const h=document.createElement("div");

  h.className="heehee";
  h.innerText="HeeHee 🤭";

  document.body.appendChild(h);

  setTimeout(()=>{
    h.style.bottom="35px";
  },20);

  setTimeout(()=>{
    h.style.opacity="0";
    h.style.bottom="70px";
  },850);

  setTimeout(()=>{
    h.remove();
  },1300);
}

function shake(){
  document.body.classList.add("shake");

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },250);
}

function wrongOption(){

  wrongOption.lastTrigger=wrongOption.lastTrigger||0;

  if(Date.now()-wrongOption.lastTrigger<200) return;

  wrongOption.lastTrigger=Date.now();

  toast("Wrong option 😡");
  heehee();
  shake();

  if(navigator.vibrate){
    navigator.vibrate(40);
  }
}

function addMessage(text,side){

  const row=document.createElement("div");
  row.className=`message-row ${side}`;

  const bubble=document.createElement("div");
  bubble.className="bubble";

  if(side==="right"){
    bubble.innerHTML=`${text}<div class="time">${now()} ✓✓</div>`;
  }else{
    bubble.innerHTML=`${text}<div class="time">${now()}</div>`;
  }

  row.appendChild(bubble);

  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;
}

function typing(cb){

  const row=document.createElement("div");

  row.className="message-row left";

  row.innerHTML=`
  <div class="bubble">
    <div class="typing">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  `;

  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;

  setTimeout(()=>{
    row.remove();
    cb();
  },1300);
}

function createButton(text,color,x,y,fn){

  const b=document.createElement("button");

  b.className="option-btn";
  b.innerText=text;

  b.style.background=color;
  b.style.left=x;
  b.style.top=y;

  b.onclick=fn;

  return b;
}

/* ================= STEP 1 ================= */

function step1(){

  setStep(1);

  typing(()=>{

    addMessage("Assalamu Alaikum Eid Mubarak 🌙","left");

    const wrap=document.createElement("div");
    wrap.className="options";

    const eid=createButton(
      "Eid Mubarak 👍",
      "#00a884",
      "25px",
      "140px",

      ()=>{

        pointer.remove();

        addMessage("Eid Mubarak 👍","right");

        wrap.remove();

        typing(()=>{
          addMessage("Dhonnobad Dhonnobad, ta salamita? 💁‍♂️","left");
          step2();
        });
      }
    );

    const same=createButton(
      "Same to you",
      "#ff6b6b",
      "210px",
      "60px",
      ()=>{}
    );

    function moveSame(e){

      if(e) e.preventDefault();

      pointer.remove();

      wrongOption();

      let x=Math.random()*160+100;
      let y=Math.random()*140;

      same.style.left=x+"px";
      same.style.top=y+"px";
    }

    same.addEventListener("mouseenter",moveSame);
    same.addEventListener("touchstart",moveSame,{passive:false});

    const pointer=document.createElement("div");

    pointer.className="pointer";
    pointer.innerHTML="👇 Press Here";

    pointer.style.left="215px";
    pointer.style.top="15px";

    wrap.appendChild(eid);
    wrap.appendChild(same);
    wrap.appendChild(pointer);

    chatBox.appendChild(wrap);

    chatBox.scrollTop=chatBox.scrollHeight;

  });
}

/* ================= STEP 2 ================= */

function step2(){

  setStep(2);

  const wrap=document.createElement("div");
  wrap.className="options";

  const good=createButton(
    "Accha Dicchi 👍",
    "#00a884",
    "95px",
    "160px",

    ()=>{

      addMessage("Accha Dicchi 👍","right");

      wrap.remove();

      typing(()=>{
        addMessage("Dhonnobad Dhonnobad, ta koto? 😌","left");
        step3();
      });
    }
  );

  const bad1=createButton(
    "Kisher salami ❌",
    "#ff6b6b",
    "15px",
    "30px",
    ()=>{}
  );

  const bad2=createButton(
    "Amare Tumi diba 👎",
    "#4d96ff",
    "20px",
    "90px",
    ()=>{}
  );

  function move(btn,e){

    if(e) e.preventDefault();

    wrongOption();

    let x=Math.random()*200;
    let y=Math.random()*160;

    btn.style.left=x+"px";
    btn.style.top=y+"px";
  }

  bad1.addEventListener("mouseenter",(e)=>move(bad1,e));
  bad2.addEventListener("mouseenter",(e)=>move(bad2,e));

  bad1.addEventListener("touchstart",(e)=>move(bad1,e),{passive:false});
  bad2.addEventListener("touchstart",(e)=>move(bad2,e),{passive:false});

  wrap.appendChild(bad1);
  wrap.appendChild(bad2);
  wrap.appendChild(good);

  chatBox.appendChild(wrap);

  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ================= STEP 3 ================= */

function step3(){

  setStep(3);

  const wrap=document.createElement("div");
  wrap.className="options";

  const a=createButton(
    "No Salami ❌",
    "#6c63ff",
    "25px",
    "35px",
    ()=>wrongOption()
  );

  const b=createButton(
    "10 TK",
    "#6c63ff",
    "235px",
    "35px",
    ()=>wrongOption()
  );

  const c=createButton(
    "30 TK",
    "#6c63ff",
    "105px",
    "145px",
    ()=>wrongOption()
  );

  const big=createButton(
    "500 TK 😡",
    "#ff0055",
    "165px",
    "235px",

    ()=>{

      clearInterval(growInterval);

      big.remove();

      confettiBlast();

      setTimeout(()=>{
        showEnd();
      },1800);
    }
  );

  a.style.transform="scale(1.5)";
  b.style.transform="scale(1.5)";
  c.style.transform="scale(1.5)";

  big.style.transform="scale(.2)";
  big.style.zIndex="999";

  a.dataset.x=25;
  a.dataset.y=35;

  b.dataset.x=235;
  b.dataset.y=35;

  c.dataset.x=105;
  c.dataset.y=145;

  wrap.appendChild(a);
  wrap.appendChild(b);
  wrap.appendChild(c);
  wrap.appendChild(big);

  chatBox.appendChild(wrap);

  chatBox.scrollTop=chatBox.scrollHeight;

  let grow=.2;

  const growInterval=setInterval(()=>{

    grow+=.08;

    big.style.transform=`scale(${grow})`;

    if(grow>.5){

      a.dataset.x=parseFloat(a.dataset.x)-5;
      a.style.left=a.dataset.x+"px";

      b.dataset.x=parseFloat(b.dataset.x)+5;
      b.style.left=b.dataset.x+"px";

      c.dataset.y=parseFloat(c.dataset.y)+4;
      c.style.top=c.dataset.y+"px";
    }

    if(grow>10){

      big.style.position="fixed";
      big.style.inset="0";
      big.style.width="100vw";
      big.style.height="100vh";
      big.style.borderRadius="0";
      big.style.zIndex="99999";
      big.style.fontSize="50px";
    }

    if(parseFloat(a.dataset.x)<-200){
      a.style.opacity="0";
    }

    if(parseFloat(b.dataset.x)>450){
      b.style.opacity="0";
    }

    if(parseFloat(c.dataset.y)>450){
      c.style.opacity="0";
    }

  },130);
}

/* ================= CONFETTI ================= */

function confettiBlast(){

  const emojis=["🎉","✨","🎊","💵","💫","🥳","💰"];

  for(let i=0;i<120;i++){

    const d=document.createElement("div");

    d.innerText=emojis[Math.random()*emojis.length|0];

    d.style.position="fixed";
    d.style.left="50%";
    d.style.top="50%";
    d.style.fontSize=(20+Math.random()*20)+"px";
    d.style.zIndex="999999";

    document.body.appendChild(d);

    const angle=Math.random()*Math.PI*2;
    const radius=150+Math.random()*350;

    const x=Math.cos(angle)*radius;
    const y=Math.sin(angle)*radius;

    setTimeout(()=>{

      d.style.transition="1.5s cubic-bezier(.1,.8,.3,1)";

      d.style.transform=`
      translate(${x}px,${y}px)
      rotate(${Math.random()*360}deg)
      scale(.2)
      `;

      d.style.opacity="0";

    },20);

    setTimeout(()=>{
      d.remove();
    },1500);
  }
}

/* ================= END SCREEN ================= */

function showEnd(){

  setStep(4);

  const end=document.createElement("div");

  end.className="end-screen";

  end.innerHTML=`

  <div style="
  font-size:80px;
  margin-bottom:10px;
  position:relative;
  z-index:5;
  ">
  🥰
  </div>

  <h1 style="
  font-size:28px;
  font-weight:bold;
  position:relative;
  z-index:5;
  ">
  Dhonnobad Dhonnobad!
  </h1>

  <p style="
  margin-top:20px;
  font-size:22px;
  color:#00a884;
  font-weight:bold;
  position:relative;
  z-index:5;
  ">
  I receive — Salami 💸
  </p>

  <p style="
  margin-top:10px;
  font-size:20px;
  color:#e9edef;
  position:relative;
  z-index:5;
  ">
  You receive — Dua 🤲
  </p>

  <div style="
  position:fixed;
  bottom:18px;
  right:10px;
  font-size:11px;
  opacity:.45;
  font-style:italic;
  letter-spacing:1px;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  transform:rotate(180deg);
  z-index:5;
  ">
  Dishting Dishting ✨
  </div>

  `;

  document.body.appendChild(end);
}

</script>

</body>
</html>
