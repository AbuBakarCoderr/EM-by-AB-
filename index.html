<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Chat Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-size:400px;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.2s;
}

.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
overflow:hidden;
position:relative;
}

.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:20px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:url("https://drive.google.com/uc?export=view&id=1yTQLNM23xkL37yNq-Bb8eqliGfcaaCt_");
background-size:cover;
background-position:center;
margin-right:12px;
}

.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
flex-direction:column;
margin:10px 0;
}

.left{align-items:flex-start;}
.right{align-items:flex-end;}

.bubble{
padding:12px 16px;
border-radius:18px;
max-width:75%;
color:white;
position:relative;
font-size:15px;
}

.left .bubble{background:#202c33;}
.right .bubble{background:#005c4b;}

.time{
font-size:10px;
opacity:0.6;
margin-top:4px;
text-align:right;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:15px;
min-height:200px;
position:relative;
}

.option-btn{
padding:12px 18px;
border:none;
border-radius:25px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:#25D366;
transition:0.2s;
color:white;
}

.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:8px 12px;
border-radius:20px;
}

/* shake */
.shake{animation:shake 0.25s;}
@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-4px,3px);}
50%{transform:translate(4px,-3px);}
75%{transform:translate(-3px,2px);}
100%{transform:translate(0,0);}
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
color:white;
padding:10px 16px;
border-radius:20px;
font-weight:bold;
z-index:9999;
animation:fade 1.2s ease;
}

@keyframes fade{
0%{opacity:0;transform:translate(-50%,-10px);}
20%{opacity:1;}
100%{opacity:0;transform:translate(-50%,-30px);}
}

/* end */
.end{
position:fixed;
inset:0;
background:#111b21;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:99999;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<div class="profile"></div>
Eid Chat
</div>

<div class="chat-box" id="chatBox"></div>
<div class="step" id="step">Step 1/4</div>

</div>

<script>

/* ================= SONG ================= */
const bg=new Audio("https://files.catbox.moe/sauxt7.mp3");
bg.loop=true;
bg.volume=0.35;

window.addEventListener("load",()=>bg.play().catch(()=>{}));
document.body.addEventListener("click",()=>bg.play().catch(()=>{}),{once:true});

/* ================= AUDIO ================= */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(t){
const o=ctx.createOscillator();
const g=ctx.createGain();
o.connect(g); g.connect(ctx.destination);

if(t==="ding") o.frequency.value=800;
if(t==="woosh") o.frequency.value=300;
if(t==="buzz") o.frequency.value=120;

g.gain.value=0.05;
o.start();
o.stop(ctx.currentTime+0.12);
}

/* ================= VIBRATION ================= */
function vibrate(type){
if(!navigator.vibrate) return;
if(type==="correct") navigator.vibrate(20);
if(type==="wrong") navigator.vibrate([80,120,80]);
}

/* ================= ELEMENTS ================= */
const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

/* ================= TIME ================= */
function now(){
return new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

/* ================= MESSAGE ================= */
function msg(text,side){

const r=document.createElement("div");
r.className=`message-row ${side}`;

const b=document.createElement("div");
b.className="bubble";

if(side==="right"){
b.innerHTML=`${text}<div class="time">${now()} ✓✓</div>`;
sound("woosh");
vibrate("correct");
}else{
b.innerHTML=`${text}<div class="time">${now()}</div>`;
sound("ding");
}

r.appendChild(b);
chatBox.appendChild(r);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* ================= BUTTON ================= */
function btn(t,f){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=t;
b.onclick=f;
return b;
}

/* ================= OPTIONS ================= */
function add(o){
const w=document.createElement("div");
w.className="options";
o.forEach(x=>w.appendChild(x));
chatBox.appendChild(w);
}

function clear(){
document.querySelectorAll(".options").forEach(e=>e.remove());
}

/* ================= TOAST ================= */
function toast(t){
const d=document.createElement("div");
d.className="toast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),1200);
}

/* ================= STEP 1 RUNAWAY ================= */
function runaway(btn,fn){

btn.style.position="absolute";
btn.onmouseenter=move;
btn.ontouchstart=move;
btn.onclick=fn;

function move(){

const SAFE_X=180;
const SAFE_Y=120;

let x,y;
do{
x=Math.random()*320;
y=Math.random()*180;
}while(x<SAFE_X && y<SAFE_Y);

btn.style.left=x+"px";
btn.style.top=y+"px";

sound("woosh");
vibrate("correct");
}
}

/* ================= STEP 1 ================= */
function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const a=btn("Eid Mubarak",()=>next1());
a.style.background="#4d96ff";

const b=btn("Same to you",()=>runaway(b,next1));
b.style.background="#ff6b6b";

add([a,b]);
}

/* ================= NEXT ================= */
function next1(){

msg("Eid Mubarak 😌","right");
clear();

typing(()=>{
msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");
step2();
});

}

/* ================= TYPING ================= */
function typing(cb){

const d=document.createElement("div");
d.className="message-row left";
d.innerHTML=`<div class="bubble">typing... ●●●</div>`;
chatBox.appendChild(d);

setTimeout(()=>{d.remove();cb();},900);
}

/* ================= STEP 2 (FIXED) ================= */
function step2(){

step.innerText="Step 2/4";

const a=btn("Kisher Salami?",()=>{});
const b=btn("Tumi Amare Diba",()=>{});

const c=btn("Accha Dicchi 😊👍",()=>{

msg("Accha Dicchi 😊👍","right");
clear();
typing(()=>step3());

});

a.style.background="#ff6b6b";
b.style.background="#4d96ff";
c.style.background="#6bff95";

/* ONLY TWO RUN AWAY */
makeRunaway(a);
makeRunaway(b);

add([a,b,c]);
}

function makeRunaway(b){
b.onmouseenter=()=>{
b.style.transform=`translate(${(Math.random()-0.5)*160}px,${(Math.random()-0.5)*100}px)`;
sound("woosh");
};
}

/* ================= STEP 3 ================= */
function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const a=btn("10 TK",wrong);
const b=btn("50 TK",wrong);
const c=btn("No salami❌👎",wrong);

const big=btn("500 TK 😡",()=>{

msg("500 TK 😡","right");
clear();

confetti();
end();

});

big.style.background="#ff2e63";

add([a,b,c,big]);

grow(big);
}

/* ================= GROW ================= */
let growVal=1;
let growInt;

function grow(b){

clearInterval(growInt);
growVal=1;

growInt=setInterval(()=>{

growVal+=0.015;

b.style.transform=`scale(${growVal})`;

document.querySelectorAll(".option-btn").forEach(x=>{
if(x!==b){
x.style.opacity=Math.max(0.3,1-growVal/6);
x.style.transform="scale(0.8)";
}
});

},400);
}

/* ================= WRONG ================= */
function wrong(){
toast("Wrong option 😡");
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
vibrate("wrong");
sound("buzz");
}

/* ================= CONFETTI ================= */
function confetti(){

for(let i=0;i<100;i++){

const d=document.createElement("div");
d.innerText=["🎉","✨","🎊"][Math.random()*3|0];

d.style.position="fixed";
d.style.left="50%";
d.style.top="50%";
d.style.fontSize="18px";
document.body.appendChild(d);

const a=Math.random()*Math.PI*2;
const r=250+Math.random()*250;

setTimeout(()=>{
d.style.transition="1.4s ease-out";
d.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;
d.style.opacity="0";
},20);

setTimeout(()=>d.remove(),1800);
}

}

/* ================= END ================= */
function end(){

setTimeout(()=>{

document.body.innerHTML=`
<div class="end">
<h1>🥰 Dhonnobad Dhonnobad</h1>
<p>DM e Number dicchi 🥰👍</p>
<p style="opacity:0.7">(You received dua)</p>
</div>
`;

},900);

}

/* ================= START ================= */
step1();

</script>

</body>
</html>
