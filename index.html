<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b141a;
background-image:url("https://i.imgur.com/7v5ASc8.png");
background-repeat:repeat;
background-size:420px;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* container */
.chat-container{
width:100%;
max-width:450px;
height:100vh;
background:linear-gradient(#111b21,#0b141a);
overflow:hidden;
position:relative;
}

/* header */
.header{
height:80px;
background:#202c33;
display:flex;
align-items:center;
padding:15px;
color:white;
font-size:22px;
font-weight:bold;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#ff8ad8,#ffd166);
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:bold;
text-align:center;
margin-right:15px;
}

/* chat */
.chat-box{
height:calc(100vh - 80px);
overflow-y:auto;
padding:20px 10px 120px;
}

.message-row{
display:flex;
margin:12px 0;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

.bubble{
padding:14px 18px;
border-radius:20px;
max-width:75%;
color:white;
}

.left .bubble{background:#202c33;}
.right .bubble{background:#005c4b;}

/* options */
.options{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
min-height:220px;
position:relative;
}

.option-btn{
padding:14px 20px;
border:none;
border-radius:30px;
font-weight:bold;
font-size:18px;
cursor:pointer;
transition:0.2s;
background:#25D366;
}

/* step */
.step{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:20px;
}

/* typing */
.typing{
display:flex;
gap:5px;
padding:14px 18px;
background:#202c33;
border-radius:20px;
width:fit-content;
}

.dot{
width:6px;
height:6px;
background:#aaa;
border-radius:50%;
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

/* toast */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
color:white;
padding:12px 18px;
border-radius:20px;
font-weight:bold;
opacity:0;
transition:0.3s;
z-index:99999;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(10px);
}

/* shake */
.shake{
animation:shake 0.25s;
}

@keyframes shake{
0%{transform:translate(0,0);}
20%{transform:translate(-5px,3px);}
40%{transform:translate(5px,-3px);}
60%{transform:translate(-5px,2px);}
80%{transform:translate(5px,-2px);}
100%{transform:translate(0,0);}
}

/* flash */
.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
opacity:0;
z-index:99998;
pointer-events:none;
}

.flash.active{
animation:flash 0.3s;
}

@keyframes flash{
0%{opacity:0;}
30%{opacity:0.4;}
100%{opacity:0;}
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<div class="profile">💖</div>
Eid Chat
</div>

<div class="chat-box" id="chatBox"></div>

<div class="step" id="step">Step 1/4</div>

</div>

<script>

/* FLASH */
const flash=document.createElement("div");
flash.className="flash";
document.body.appendChild(flash);

/* MUSIC */
const bgMusic=new Audio("https://files.catbox.moe/sauxt7.mp3");
bgMusic.loop=true;
bgMusic.volume=0.35;

window.addEventListener("load",()=>{
bgMusic.play().catch(()=>{});
});

document.body.addEventListener("click",()=>{
bgMusic.play().catch(()=>{});
},{once:true});

/* ELEMENTS */
const chatBox=document.getElementById("chatBox");
const step=document.getElementById("step");

let tkGrow=1;
let tkInterval;
let tkBtn;

/* MESSAGE */
function msg(text,side){
const r=document.createElement("div");
r.className=`message-row ${side}`;
const b=document.createElement("div");
b.className="bubble";
b.innerText=text;
r.appendChild(b);
chatBox.appendChild(r);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* TOAST */
function showToast(text){
let t=document.createElement("div");
t.className="toast";
t.innerText=text;
document.body.appendChild(t);

setTimeout(()=>t.classList.add("show"),50);
setTimeout(()=>{
t.classList.remove("show");
setTimeout(()=>t.remove(),300);
},1500);
}

/* FX */
function wrongFX(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),250);

flash.classList.remove("active");
void flash.offsetWidth;
flash.classList.add("active");
}

/* BUTTON */
function btn(text,fn){
const b=document.createElement("button");
b.className="option-btn";
b.innerText=text;
b.onclick=fn;
return b;
}

/* OPTIONS */
function addOptions(arr){
const w=document.createElement("div");
w.className="options";
arr.forEach(b=>w.appendChild(b));
chatBox.appendChild(w);
}

/* RUNAWAY */
function runAway(btn,success){

btn.style.position="absolute";

btn.onmouseenter=move;
btn.ontouchstart=move;

function move(){
btn.style.left=Math.random()*220+"px";
btn.style.top=Math.random()*120+"px";
}

btn.onclick=success;
}

/* STEP 1 */
function step1(){

step.innerText="Step 1/4";

msg("Assalamu alaikum Eid Mubarak","left");

const b1=btn("Eid Mubarak",()=>{
step1Reply("Eid Mubarak");
});

b1.style.background="#4d96ff";

const b2=btn("Same to you",()=>runAway(b2));

b2.style.background="#ff6b6b";

addOptions([b1,b2]);
}

/* STEP 1 REPLY */
function step1Reply(t){

msg(t,"right");

setTimeout(()=>{

msg("Dhonnobad Dhonnobad. Ta Salami ta? 💁‍♂️","left");
step2();

},800);
}

/* STEP 2 */
function step2(){

step.innerText="Step 2/4";

const b1=btn("Kisher Salami?",()=>{});
const b2=btn("Tumi Amare Diba",()=>{});
const b3=btn("Accha Dicchi 😊👍",()=>{
msg("Accha Dicchi 😊👍","right");
setTimeout(step3,700);
});

b1.style.background="#ff6b6b";
b2.style.background="#4d96ff";
b3.style.background="#6bff95";

addOptions([b1,b2,b3]);
}

/* STEP 3 */
function step3(){

step.innerText="Step 3/4";

msg("Tahole kotto salami? 😌","left");

const b10=btn("10 TK",wrong);
const b50=btn("50 TK",wrong);
const bNo=btn("No salami❌👎",wrong);

const b500=btn("500 TK 😡",()=>{
clearInterval(tkInterval);
msg("500 TK 😡","right");
alertBox();
});

tkBtn=b500;
tkGrow=1;

addOptions([b10,b50,bNo,b500]);

startGrow();

function wrong(){
wrongFX();
showToast("Wrong option😡");
tkGrow+=0.7;
startGrow();
}
}

/* GROW */
function startGrow(){

clearInterval(tkInterval);

tkInterval=setInterval(()=>{

tkGrow+=0.04;

tkBtn.style.transform=`scale(${tkGrow})`;
tkBtn.style.zIndex=999;

document.querySelectorAll(".option-btn").forEach(b=>{
if(b!==tkBtn){
b.style.opacity=Math.max(0.1,1-tkGrow/4);
b.style.transform="scale(0.7)";
}
});

},300);

}

/* FINAL */
function alertBox(){

const d=document.createElement("div");
d.innerText="500 TK 😡";

d.style.position="fixed";
d.style.top="50%";
d.style.left="50%";
d.style.transform="translate(-50%,-50%)";
d.style.background="#25D366";
d.style.padding="30px";
d.style.borderRadius="20px";
d.style.fontSize="40px";
d.style.zIndex="99999";

document.body.appendChild(d);

setTimeout(()=>d.remove(),3000);
}

step1();

</script>

</body>
</html>
